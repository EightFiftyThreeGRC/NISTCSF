<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIST CSF 2.0 Guided Assessment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a2332;min-height:100vh}
#app{min-height:100vh}
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:48px;height:48px;border:5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{color:#fff;font-size:1rem;font-weight:500;max-width:420px;text-align:center;line-height:1.35}
#loading-hint{display:none;color:rgba(255,255,255,.85);font-size:.82rem;font-weight:400;max-width:440px;text-align:center;line-height:1.5;padding:0 20px;margin-top:4px}
.top-bar{background:#0d2137;color:#fff;padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.top-bar h1{font-size:1.05rem;font-weight:600;letter-spacing:.3px}
.top-bar .badge{background:#1e88e5;color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:8px;font-weight:600}
.topbar-home{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);padding:5px 12px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.topbar-home:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.45)}
.top-bar h1:hover{opacity:.85}
@media print{.topbar-home{display:none}}
.progress-bar{background:#1a3a5c;padding:0 32px}
.steps-row{display:flex;gap:0}
.step-pill{padding:10px 0;flex:1;text-align:center;font-size:.72rem;color:#7ab3d8;border-bottom:3px solid transparent;transition:.2s;cursor:default}
.step-pill.active{color:#fff;border-bottom-color:#1e88e5}
.step-pill.done{color:#66bb6a;border-bottom-color:#66bb6a}
.container{max-width:960px;margin:32px auto;padding:0 24px}
.container-drl{max-width:1220px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:32px;margin-bottom:24px}
.card h2{font-size:1.3rem;font-weight:700;color:#0d2137;margin-bottom:6px}
.card .sub{color:#5a7a96;font-size:.9rem;margin-bottom:24px}
.section-label{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#1e88e5;margin-bottom:10px}
label{display:block;font-size:.85rem;font-weight:600;color:#2c4a6a;margin-bottom:4px;margin-top:14px}
input[type=text],input[type=date],input[type=password],select,textarea{width:100%;padding:10px 12px;border:1.5px solid #d0dce8;border-radius:8px;font-size:.9rem;color:#1a2332;background:#fff;outline:none;transition:.2s}
input:focus,select:focus,textarea:focus{border-color:#1e88e5;box-shadow:0 0 0 3px rgba(30,136,229,.12)}
textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:#1e88e5;color:#fff}.btn-primary:hover{background:#1565c0}
.btn-secondary{background:#e3edf7;color:#1a3a5c}.btn-secondary:hover{background:#ccdcef}
.btn-success{background:#43a047;color:#fff}.btn-success:hover{background:#2e7d32}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn:disabled{opacity:.45;cursor:not-allowed}
.row{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:200px}
.chip{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700}
.chip-red{background:#ffebee;color:#c62828}
.chip-orange{background:#fff3e0;color:#e65100}
.chip-yellow{background:#fffde7;color:#f57f17}
.chip-lgreen{background:#f1f8e9;color:#2e7d32}
.chip-green{background:#e8f5e9;color:#1b5e20}
.chip-gray{background:#f0f4f8;color:#5a7a96}
.provider-card{border:1.5px solid #d0dce8;border-radius:10px;padding:16px;cursor:pointer;transition:.2s;display:flex;align-items:flex-start;gap:12px}
.provider-card.selected{border-color:#1e88e5;background:#f0f7ff}
.provider-card input{margin-top:3px;flex-shrink:0}
.drl-table-wrap{margin-bottom:8px;border-radius:10px;border:1px solid #d0dce8;background:#fff;width:100%;max-width:100%;overflow-x:visible}
.drl-master{width:100%;max-width:100%;min-width:0;border-collapse:collapse;font-size:.78rem;table-layout:fixed}
.drl-master th{text-align:left;background:#f0f4f8;color:#2c4a6a;font-size:.68rem;text-transform:uppercase;letter-spacing:.35px;padding:10px 8px;border-bottom:2px solid #d0dce8;vertical-align:bottom;overflow-wrap:break-word}
.drl-master td{padding:10px 8px;border-bottom:1px solid #e8eef4;vertical-align:top;overflow-wrap:break-word;word-wrap:break-word}
.drl-master tbody tr:hover{background:#fafcfe}
.drl-master tbody tr.drl-cat-done{background:#f9fff9}
.drl-master tbody tr.drl-cat-done:hover{background:#f2fff2}
.drl-th-fn,.drl-td-fn{width:13%}
.drl-th-cat,.drl-td-cat{width:19%}
.drl-th-req,.drl-td-req{width:17%}
.drl-th-up,.drl-td-up{width:11%}
.drl-th-ctx,.drl-td-ctx{width:22%}
.drl-th-np,.drl-td-np{width:18%}
.drl-td-fn,.drl-td-cat{background:#fbfdff}
.drl-bucket-title{font-weight:700;font-size:.8rem;color:#0d2137;margin-bottom:4px;line-height:1.3}
.drl-bucket-desc{font-size:.72rem;color:#5a7a96;line-height:1.45;margin:0 0 6px 0}
.drl-fn-block{margin-top:8px;padding-top:8px;border-top:1px solid #e3edf7}
.drl-td-fn .drl-fn-block:first-child{margin-top:0;padding-top:0;border-top:none}
.drl-fn-name{font-size:.74rem;color:#0d2137}
.drl-fn-explain{font-size:.7rem;color:#3d5a78;line-height:1.45;margin:4px 0 0 0}
.drl-catlist-label{font-size:.68rem;font-weight:600;color:#1e88e5;margin-top:8px;margin-bottom:3px}
.drl-catlist{margin:0;padding-left:16px}
.drl-catlist li{margin-bottom:2px;font-size:.68rem;color:#4a6688;line-height:1.35}
.drl-cell-muted{color:#8aa3bc;font-size:.75rem;padding:8px 0}
.req-card{border:1px solid #d9e4ef;border-radius:8px;padding:10px;margin-bottom:10px;background:#fff}
.req-title{font-size:.8rem;font-weight:700;color:#1a2332;margin-bottom:4px}
.req-hint{font-size:.73rem;color:#7a9ab8;margin-bottom:8px}
.req-context{margin-top:6px}
.np-box{margin-top:8px;padding:8px;border:1px solid #ffd59c;background:#fff8ef;border-radius:8px}
.drl-np-label{font-size:.75rem;font-weight:600;color:#8b5a00;margin:0;display:flex;align-items:flex-start;gap:8px;cursor:pointer;flex-wrap:wrap;max-width:100%}
.drl-np-label input{flex-shrink:0;margin-top:2px}
.drl-np-hint{display:block;width:100%;max-width:100%;box-sizing:border-box;font-size:.7rem;color:#7a8aa0;font-style:italic;margin:8px 0 0 0;line-height:1.45;overflow-wrap:break-word;word-wrap:break-word;white-space:normal}
.drl-catlist-hint{font-weight:400;color:#8aa3bc;font-size:.65rem}
.drl-cat-jump{color:#1565c0;text-decoration:none}
.drl-cat-jump:hover{text-decoration:underline}
.drl-page-split{display:flex;align-items:stretch;width:100%;max-width:100%;margin-bottom:16px;gap:0}
.drl-sc-rail{flex:0 0 44px;display:flex;flex-direction:column;align-items:center;padding:12px 0;background:#e8eef4;border:1px solid #d0dce8;border-radius:10px 0 0 10px;border-right:0}
.drl-sc-fab{width:36px;min-height:100px;padding:8px 4px;border:none;border-radius:8px;background:#fff;color:#1e88e5;font-size:.85rem;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);line-height:1.2}
.drl-sc-fab:hover{background:#f0f7ff}
.drl-sc-sidebar{flex:0 0 288px;max-width:288px;display:flex;flex-direction:column;min-height:280px;max-height:min(78vh,calc(100vh - 48px));align-self:flex-start;position:sticky;top:12px;border:1px solid #d0dce8;border-left:0;background:#fbfdff;border-radius:0 10px 10px 0;transition:flex .22s ease,max-width .22s ease,opacity .22s ease,min-width .22s ease;overflow:hidden}
.drl-sc-sidebar.collapsed{flex:0 0 0;max-width:0;min-width:0;width:0;opacity:0;border:none;padding:0;margin:0;pointer-events:none}
.drl-sc-sidebar-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid #e0eaf4;font-size:.72rem;color:#0d2137;flex-shrink:0;background:#fff}
.drl-sc-count{font-size:.68rem;color:#5a7a96;font-weight:600}
.drl-sc-close{width:28px;height:28px;border:none;border-radius:6px;background:#f0f4f8;color:#2c4a6a;font-size:1.1rem;line-height:1;cursor:pointer}
.drl-sc-close:hover{background:#e3edf7}
.drl-sc-sidebar-scroll{overflow-y:auto;overflow-x:hidden;padding:8px 10px 14px;flex:1;font-size:.68rem;-webkit-overflow-scrolling:touch}
.drl-sc-catsec{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #e8eef4}
.drl-sc-catsec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.drl-sc-cat-head{font-size:.7rem;color:#1e88e5;margin:0 0 6px 0;font-weight:700;line-height:1.3}
.drl-sc-sublist{list-style:none;padding:0;margin:0}
.drl-sc-subitem{margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f4f8}
.drl-sc-subitem:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
.drl-sc-subid{font-weight:700;color:#0d2137;font-size:.66rem;margin-bottom:3px}
.drl-sc-subtext{color:#3d5a78;line-height:1.4;font-size:.66rem}
.drl-sc-catsec.drl-sc-flash{animation:drlScFlash 1.1s ease}
@keyframes drlScFlash{0%{background:#fff8e1}40%{background:#fff3c4}100%{background:transparent}}
.drl-sc-main{flex:1;min-width:0}
.drl-fn-filter-card{padding:18px 24px!important;margin-bottom:16px}
.drl-fn-filter-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#1e88e5;margin-bottom:6px}
.drl-fn-filter-hint{font-size:.78rem;color:#5a7a96;margin:0 0 12px 0;line-height:1.45}
.drl-fn-filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.drl-fn-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1.5px solid #d0dce8;background:#fff;font-size:.72rem;font-weight:600;color:#5a7a96;cursor:pointer;transition:.15s}
.drl-fn-pill .drl-fn-pill-name{font-weight:600;font-size:.72rem}
.drl-fn-pill.is-on{color:#0d2137;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.drl-fn-pill:hover{filter:brightness(0.98)}
.drl-drop-zone{min-height:44px;display:flex;align-items:center;justify-content:center;padding:10px 6px!important;font-size:.72rem!important}
.np-box textarea{width:100%;min-height:72px;margin-top:0}
.drl-master .req-context textarea{min-height:52px;font-size:.76rem;padding:8px}
.drop-zone{border:2px dashed #b0c8e0;border-radius:8px;padding:16px;text-align:center;font-size:.8rem;color:#5a7a96;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:#1e88e5;background:#f0f7ff}
.file-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.file-item{display:flex;align-items:center;justify-content:space-between;gap:6px;background:#f0f4f8;border-radius:6px;padding:5px 8px;font-size:.74rem;min-width:0}
.file-item>span:first-child{min-width:0;overflow-wrap:anywhere;flex:1}
.file-item .rm{cursor:pointer;color:#e53935;font-weight:700;margin-left:0;flex-shrink:0}
.drl-master .req-title{font-size:.76rem;line-height:1.3}
.drl-master .req-hint{font-size:.7rem}
.q-card{background:#fff;border:1.5px solid #d0dce8;border-radius:10px;padding:20px;margin-bottom:14px}
.q-text{font-size:.92rem;font-weight:600;margin-bottom:4px;color:#1a2332}
.q-guide{font-size:.75rem;color:#7a9ab8;margin-bottom:12px;font-style:italic}
.q-scs{font-size:.7rem;color:#1e88e5;margin-bottom:10px}
.likert-row{display:flex;gap:6px;flex-wrap:wrap}
.likert-btn{flex:1;min-width:80px;padding:8px 4px;border:1.5px solid #d0dce8;border-radius:8px;background:#fff;cursor:pointer;font-size:.75rem;text-align:center;transition:.15s}
.likert-btn:hover{border-color:#1e88e5;background:#f0f7ff}
.likert-btn.selected{border-color:#1e88e5;background:#1e88e5;color:#fff}
.yn-row{display:flex;gap:8px}
.yn-btn{flex:1;padding:9px;border:1.5px solid #d0dce8;border-radius:8px;background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;text-align:center;transition:.15s}
.yn-btn:hover{border-color:#1e88e5}
.yn-btn.selected{border-color:#1e88e5;background:#1e88e5;color:#fff}
.role-tabs{display:flex;gap:0;border-bottom:2px solid #e0eaf4;margin-bottom:24px;overflow-x:auto}
.role-tab{padding:10px 20px;cursor:pointer;font-size:.85rem;font-weight:600;color:#5a7a96;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s}
.role-tab.active{color:#1e88e5;border-bottom-color:#1e88e5}
.finding-card{border:1.5px solid #d0dce8;border-radius:10px;padding:20px;margin-bottom:12px;transition:.2s}
.finding-card.approved{border-color:#66bb6a;background:#f9fff9}
.finding-card.disputed{border-color:#ffa726;background:#fffbf0}
.finding-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.finding-id{font-size:.8rem;font-weight:700;color:#1e88e5;white-space:nowrap}
.finding-text{font-size:.85rem;color:#1a2332;font-weight:600;flex:1}
.finding-scores{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.score-badge{padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;white-space:nowrap}
.finding-body{font-size:.83rem;color:#2c4a6a;line-height:1.55}
.finding-body .label{font-weight:700;color:#0d2137;margin-top:8px;display:block}
.finding-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.dispute-box{background:#fff8f0;border:1.5px solid #ffa726;border-radius:8px;padding:14px;margin-top:12px}
.evidence-table{width:100%;border-collapse:collapse;font-size:.82rem}
.evidence-table th{background:#f0f4f8;padding:8px 12px;text-align:left;font-weight:700;color:#2c4a6a;border-bottom:2px solid #d0dce8}
.evidence-table td{padding:8px 12px;border-bottom:1px solid #eef2f7;vertical-align:top}
.evidence-table tr:hover td{background:#f8fafc}
.tabs-row{display:flex;gap:0;border-bottom:2px solid #e0eaf4;margin-bottom:20px;overflow-x:auto}
.fn-tab{padding:10px 18px;cursor:pointer;font-size:.83rem;font-weight:600;color:#5a7a96;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s}
.fn-tab.active{color:#0d2137;border-bottom-color:#1e88e5}
.welcome-hero{background:linear-gradient(135deg,#0d2137 0%,#1a3a5c 100%);color:#fff;padding:60px 32px;text-align:center}
.welcome-hero h1{font-size:2rem;font-weight:800;margin-bottom:10px}
.welcome-hero p{font-size:1rem;color:#a8c8e8;max-width:560px;margin:0 auto 32px}
.steps-preview{display:flex;gap:0;justify-content:center;flex-wrap:wrap}
.sp-step{padding:8px 16px;font-size:.75rem;color:#7ab3d8;display:flex;align-items:center;gap:6px}
.sp-step::after{content:'→';color:#3a6a8c;margin-left:8px}
.sp-step:last-child::after{content:''}
.stat-card{background:#f0f4f8;border-radius:10px;padding:16px;text-align:center}
.stat-num{font-size:2rem;font-weight:800;color:#1e88e5}
.stat-lbl{font-size:.78rem;color:#5a7a96;font-weight:600}
.heat-cell{padding:8px 12px;border-radius:6px;text-align:center;font-weight:700;font-size:.85rem}
.progress-ring{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.prog-bar-wrap{flex:1;background:#e0eaf4;border-radius:20px;height:10px;overflow:hidden}
.prog-bar-fill{height:100%;background:#1e88e5;border-radius:20px;transition:.3s}
.alert{padding:12px 16px;border-radius:8px;font-size:.85rem;margin-bottom:16px}
.alert-info{background:#e3f2fd;color:#1565c0;border-left:4px solid #1e88e5}
.alert-warn{background:#fff3e0;color:#e65100;border-left:4px solid #ffa726}
.alert-success{background:#e8f5e9;color:#2e7d32;border-left:4px solid #66bb6a}
.info-box{background:#f0f7ff;border:1.5px solid #90caf9;border-radius:10px;padding:16px;font-size:.83rem;color:#1a2332;line-height:1.6;margin-top:12px}
/* ── Welcome demo video ── */
.demo-video-card{padding:20px 24px}
.demo-video-head{margin-bottom:14px}
.demo-video-eyebrow{font-size:.7rem;font-weight:800;color:#1e88e5;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.demo-video{width:100%;border-radius:10px;background:#0d2137;display:block;aspect-ratio:16/9}
@media print{.demo-video-card{display:none}}
/* ── Welcome tier picker ── */
.tier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px}
.tier-card{border:1.5px solid #d0dce8;border-radius:10px;padding:16px 16px 14px;cursor:pointer;transition:.15s;background:#fff;position:relative;display:flex;flex-direction:column;min-height:170px}
.tier-card:hover{border-color:#90caf9;background:#f8fcff}
.tier-card.selected{border-color:#1e88e5;background:#f0f7ff;box-shadow:0 2px 10px rgba(30,136,229,.18)}
.tier-card.disabled{opacity:.6;cursor:not-allowed;background:#f8fafc}
.tier-card.disabled:hover{border-color:#d0dce8;background:#f8fafc}
.tier-badge{position:absolute;top:-8px;right:12px;padding:2px 9px;border-radius:10px;font-size:.65rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.tier-badge-free{background:#43a047;color:#fff}
.tier-badge-soon{background:#90a4ae;color:#fff}
.tier-name{font-weight:800;font-size:.95rem;color:#0d2137;margin-bottom:2px}
.tier-price{font-size:1.4rem;font-weight:900;color:#1e88e5;margin-bottom:6px;line-height:1.1}
.tier-price-sub{font-size:.7rem;color:#5a7a96;font-weight:600;margin-left:4px}
.tier-desc{font-size:.74rem;color:#5a7a96;line-height:1.5;flex:1}
.tier-asterisk{font-size:.66rem;color:#7a9ab8;margin-top:8px;font-style:italic;line-height:1.4}
.tier-section-label{font-size:.74rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#5a7a96;margin:18px 0 8px}
.tier-section-label:first-child{margin-top:0}
.tier-form{margin-top:16px;padding:18px;border:1.5px solid #d0dce8;border-radius:10px;background:#fafcfe}
.tier-form-head{font-weight:700;font-size:.88rem;color:#0d2137;margin-bottom:4px}
.tier-form-sub{font-size:.78rem;color:#5a7a96;margin-bottom:14px;line-height:1.5}
.coming-soon-form{margin-top:16px;padding:18px;border:1.5px solid #ffe0b2;border-radius:10px;background:#fff8e1;text-align:center}
/* ── Top Gaps & Consultation step ── */
.gap-card{border:1.5px solid #ffd1a8;border-left:5px solid #ff9800;background:#fff8f0;border-radius:10px;padding:18px 20px;margin-bottom:14px}
.gap-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.gap-rank{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#e65100;color:#fff;font-weight:800;font-size:.85rem;flex-shrink:0}
.gap-title{font-size:.95rem;font-weight:700;color:#0d2137;flex:1;line-height:1.35}
.gap-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.gap-section-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#e65100;margin-top:10px;margin-bottom:3px}
.gap-text{font-size:.85rem;color:#2c4a6a;line-height:1.55}

.consult-cta p{color:#a8c8e8;font-size:.95rem;line-height:1.55;margin-bottom:20px;max-width:680px}

.consult-stack{display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.consult-card{border-radius:14px;padding:24px 26px;box-shadow:0 2px 12px rgba(13,33,55,.08);border:1.5px solid transparent}
.consult-card-1{background:#fff;border-color:#cfe1f2}
.consult-card-2{background:#fff;border-color:#cfe1f2}
.consult-card-3{background:linear-gradient(135deg,#0d2137 0%,#1a3a5c 100%);color:#fff;border-color:transparent;box-shadow:0 4px 18px rgba(13,33,55,.22)}
.consult-card .cc-eyebrow{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#1e88e5;margin-bottom:6px}
.consult-card-3 .cc-eyebrow{color:#90caf9}
.consult-card h3{font-size:1.18rem;font-weight:800;margin:0 0 6px 0;color:#0d2137}
.consult-card-3 h3{color:#fff;font-size:1.3rem}
.consult-card .cc-blurb{font-size:.88rem;line-height:1.55;color:#3a5a78;margin-bottom:14px}
.consult-card-3 .cc-blurb{color:#a8c8e8}
.consult-card .cc-includes{margin:0 0 16px 0;padding:0;list-style:none}
.consult-card-3 .cc-includes li{color:#cfe1f2;font-size:.85rem;line-height:1.55;padding:6px 0 6px 22px;position:relative;border-bottom:1px solid rgba(255,255,255,.08)}
.consult-card-3 .cc-includes li:last-child{border-bottom:none}
.consult-card-3 .cc-includes li::before{content:'✓';position:absolute;left:0;color:#66bb6a;font-weight:900}
.consult-card-3 .cc-includes li strong{color:#fff;font-weight:700}
.consult-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1.5px solid #1e88e5;background:#fff;color:#1e88e5;font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s;margin:3px;font-family:inherit}
.consult-pill:hover{background:#1e88e5;color:#fff}
.consult-pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.consult-card-cta{background:#fff;color:#0d2137;border:none;padding:12px 22px;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.consult-card-cta:hover{background:#e3f2fd}
.consult-card-foot{font-size:.78rem;color:#5a7a96;margin-top:10px;font-style:italic}
.consult-card-3 .consult-card-foot{color:#a8c8e8;font-style:normal}
.consult-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-consult-yes{background:#43a047;color:#fff;font-size:1rem;padding:14px 24px;font-weight:700}
.btn-consult-yes:hover{background:#2e7d32}
.btn-consult-skip{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.3);font-size:.95rem;padding:13px 22px}
.btn-consult-skip:hover{background:rgba(255,255,255,.2)}
.consult-form{background:#fff;color:#1a2332;border-radius:10px;padding:24px;margin-top:18px}
.consult-form h3{color:#0d2137;font-size:1.1rem;margin-bottom:6px}
.consult-form .sub{color:#5a7a96;font-size:.85rem;margin-bottom:16px}
.consult-row{display:flex;gap:12px;flex-wrap:wrap}
.consult-row>div{flex:1;min-width:200px}
.consult-sent{background:#e8f5e9;border:1.5px solid #66bb6a;border-radius:10px;padding:18px;margin-top:18px;color:#1b5e20}
.consult-sent strong{color:#1b5e20}
@media print{
  .consult-cta,.consult-form,.gap-actions{display:none!important}
}
@media print{
  .top-bar .badge,.progress-bar,.btn,.step-pill,.finding-actions,.dispute-box{display:none!important}

}
/* ── Email verification ── */
.verify-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.verify-row input{flex:1;min-width:160px}
.verify-row .btn{flex-shrink:0;white-space:nowrap;margin-bottom:0!important}

.size-options{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}

.scope-fn{border:1.5px solid #d0dce8;border-radius:10px;overflow:hidden;margin-bottom:10px}

.scope-fn-body{padding:4px 16px 12px}

.scope-sc-id{font-weight:700;font-size:.71rem;color:#0d2137;flex-shrink:0;min-width:74px;margin-top:1px}

.scope-rec-core{background:#e8f5e9;color:#2e7d32}
.scope-rec-optional{background:#fff8e1;color:#e65100}
.scope-rec-low{background:#fff3e0;color:#bf360c}
.scope-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.scope-stat{background:#f0f4f8;border-radius:8px;padding:10px 18px;text-align:center}

function saveState(){try{localStorage.setItem('csf_state',JSON.stringify(S));}catch(e){}}
function loadState(){
  const r=localStorage.getItem('csf_state');
  if(r){
    try{
      Object.assign(S,JSON.parse(r));
      // Supported providers: 'anthropic' (full or sample) | 'gemini' (sample-only). Coerce unknown values.
      if(S.provider!=='anthropic'&&S.provider!=='gemini'){
        S.provider='anthropic';
      }
      // Coerce model to a valid value for the active provider so the dropdown shows a real selection.
      if(S.provider==='anthropic'&&S.model&&!/^claude-/.test(S.model))S.model='claude-sonnet-4-6';
      if(S.provider==='gemini'&&S.model&&!/^gemini-/.test(S.model))S.model='gemini-2.5-flash';
      if(!S.geminiApiKey)S.geminiApiKey=localStorage.getItem('csf_geminiApiKey')||'';
      if(!S.assessmentMode||(S.assessmentMode!=='full'&&S.assessmentMode!=='sample'))S.assessmentMode='full';
      // Gemini cannot reliably run the full assessment under free-tier limits — force sample mode.
      if(S.provider==='gemini')S.assessmentMode='sample';
      const _validTiers=['sample','byo'];
      if(!S.selectedTier||!_validTiers.includes(S.selectedTier))S.selectedTier='byo';
      if(S.reportPage==null||typeof S.reportPage!=='number')S.reportPage=0;
      // Migrate missing new fields
      if(!S.org.email)S.org.email='';
      if(S.org.emailVerified==null)S.org.emailVerified=false;
      if(!S.org.verificationCode)S.org.verificationCode='';

      if(!S.excludedSubcategories)S.excludedSubcategories=[];
      if(!S.aiScopeRec)S.aiScopeRec={};
      if(S.benchmarkSent==null)S.benchmarkSent=false;
      if(S.topGapsAnalysis===undefined)S.topGapsAnalysis=null;
      if(!S.consultationLead||typeof S.consultationLead!=='object')S.consultationLead={shown:false,path:'',topic:'',duration:'',name:'',company:'',email:'',phone:'',preferredContact:'',notes:'',sent:false};

function scoreColor(s){
  if(!s||s<1)return{bg:'#f0f4f8',fg:'#5a7a96'};
  if(s<2)    return{bg:'#ffebee',fg:'#c62828'};
  if(s<3)    return{bg:'#fff3e0',fg:'#e65100'};
  if(s<3.5)  return{bg:'#fffde7',fg:'#f57f17'};
  if(s<4.5)  return{bg:'#f1f8e9',fg:'#2e7d32'};
  return          {bg:'#e8f5e9',fg:'#1b5e20'};
}
function scoreChip(v,label=''){const c=scoreColor(v);return`<span class="score-badge" style="background:${c.bg};color:${c.fg}">${label}${v!=null?v:'-'}</span>`;}
function tierFromCmmi(c){if(!c||c<1)return'-';if(c<1.75)return'Tier 1';if(c<2.75)return'Tier 2';if(c<3.75)return'Tier 3';return'Tier 4';}
function tierLabel(c){if(!c||c<1)return'-';if(c<1.75)return'Tier 1 — Partial';if(c<2.75)return'Tier 2 — Risk Informed';if(c<3.75)return'Tier 3 — Repeatable';return'Tier 4 — Adaptive';}
function avg(arr){const v=arr.filter(x=>x!=null&&x>0);if(!v.length)return null;return Math.round((v.reduce((a,b)=>a+b,0)/v.length)*4)/4;}
function fmtScore(v){if(v==null)return'N/A';const s=v.toFixed(2);return s.endsWith('.00')?s.slice(0,-3):s.endsWith('0')?s.slice(0,-1):s;}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseJSON(str){
  let s=String(str||'').trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  const i=s.indexOf('{');
  const j=s.lastIndexOf('}');
  if(i===-1||j===-1||j<i)throw new Error('No JSON object found in model response.');
  s=s.slice(i,j+1);
  try{return JSON.parse(s);}
  catch(e){throw new Error(((e&&e.message)||'Invalid JSON')+' — model output may be truncated or contain unescaped characters.');}
}
function getDrlEntry(catId,reqId){
  if(!S.drl[catId])S.drl[catId]={};
  if(!S.drl[catId][reqId])S.drl[catId][reqId]={files:[],notProvided:false,notProvidedReason:''};
  return S.drl[catId][reqId];
}
function allRequests(){return DRL_CATS.flatMap(cat=>cat.requests.map(r=>({catId:cat.id,catName:cat.name,...r})));} 
function drlStats(useViewFilter){
  const reqs=useViewFilter?allRequestsForView():allRequests();
  let addressed=0,totalFiles=0;
  reqs.forEach(r=>{
    const e=getDrlEntry(r.catId,r.id);
    totalFiles+=e.files.length;
    const hasReason=e.notProvided&&(e.notProvidedReason||'').trim().length>=10;
    const filesComplete=e.files.length>0&&e.files.every(f=>(f.context||'').trim().length>=5);
    if(hasReason||filesComplete)addressed++;
  });
  return{addressed,total:reqs.length,totalFiles};
}
function validateDRL(){
  const errs=[];
  allRequestsForView().forEach(r=>{
    const e=getDrlEntry(r.catId,r.id);
    if(e.notProvided){
      if((e.notProvidedReason||'').trim().length<10)errs.push(`${r.title}: provide a not-provided reason (10+ chars).`);
      return;
    }
    if(!e.files.length){errs.push(`${r.title}: upload at least one file or mark as not provided.`);return;}
    e.files.forEach((f,idx)=>{if((f.context||'').trim().length<5)errs.push(`${r.title} (file ${idx+1}: ${f.name}) needs context (5+ chars).`);});
  });
  return errs;
}

// Anthropic doesn't accept response_format/jsonMime — left as a function so
// older callsites that pass it continue to work as a no-op.
function providerSupportsJsonMime(){return false;}

// Two pools so short calls (doc analysis) don't get serialized behind long
// calls (findings/narratives). Tier-1 Anthropic caps at ~8k OTPM, so we
// keep the long pool tight and let short calls (smaller max_tokens) fan out
// more aggressively.
const _aiPools={
  long:{limit:2,active:0,q:[]},
  short:{limit:4,active:0,q:[]},
};
function _aiSlotAcquire(poolName){
  const p=_aiPools[poolName]||_aiPools.long;
  return new Promise(resolve=>{
    if(p.active<p.limit){p.active++;resolve();}
    else p.q.push(resolve);
  });
}
function _aiSlotRelease(poolName){
  const p=_aiPools[poolName]||_aiPools.long;
  p.active--;
  const next=p.q.shift();
  if(next){p.active++;next();}
}
function _sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// In-page confirm/alert that returns Promises — replaces blocking native dialogs
// (the previous setup froze the renderer for several seconds at a time, breaking
// programmatic flows and giving an inconsistent feel against the in-app UI).
function uiConfirm(message,opts){
  opts=opts||{};
  return new Promise(resolve=>{
    const ok=opts.okText||'Confirm';
    const cancel=opts.cancelText||'Cancel';
    const danger=!!opts.danger;
    const overlay=document.createElement('div');
    overlay.className='ui-modal-overlay';
    overlay.innerHTML='<div class="ui-modal" role="dialog" aria-modal="true"><div class="ui-modal-msg"></div><div class="ui-modal-actions"><button type="button" class="btn btn-secondary" data-ui-cancel></button><button type="button" class="btn '+(danger?'btn-danger':'btn-primary')+'" data-ui-ok></button></div></div>';
    overlay.querySelector('.ui-modal-msg').textContent=message;
    overlay.querySelector('[data-ui-cancel]').textContent=cancel;
    overlay.querySelector('[data-ui-ok]').textContent=ok;
    function done(v){overlay.remove();document.removeEventListener('keydown',key);resolve(v);}
    function key(e){if(e.key==='Escape'){e.preventDefault();done(false);}else if(e.key==='Enter'){e.preventDefault();done(true);}}
    document.addEventListener('keydown',key);
    overlay.addEventListener('click',e=>{
      if(e.target===overlay)done(false);
      else if(e.target.closest('[data-ui-ok]'))done(true);
      else if(e.target.closest('[data-ui-cancel]'))done(false);
    });
    document.body.appendChild(overlay);
    overlay.querySelector('[data-ui-ok]').focus();
  });
}
function uiAlert(message,opts){
  opts=opts||{};
  return new Promise(resolve=>{
    const ok=opts.okText||'OK';
    const overlay=document.createElement('div');
    overlay.className='ui-modal-overlay';
    overlay.innerHTML='<div class="ui-modal" role="alertdialog" aria-modal="true"><div class="ui-modal-msg"></div><div class="ui-modal-actions"><button type="button" class="btn btn-primary" data-ui-ok></button></div></div>';
    overlay.querySelector('.ui-modal-msg').textContent=message;
    overlay.querySelector('[data-ui-ok]').textContent=ok;
    function done(){overlay.remove();document.removeEventListener('keydown',key);resolve();}
    function key(e){if(e.key==='Escape'||e.key==='Enter'){e.preventDefault();done();}}
    document.addEventListener('keydown',key);
    overlay.addEventListener('click',e=>{
      if(e.target===overlay||e.target.closest('[data-ui-ok]'))done();
    });
    document.body.appendChild(overlay);
    overlay.querySelector('[data-ui-ok]').focus();
  });
}

async function callAI(system, userMsg, qualityCall=false, callOpts={}){
  const pool=callOpts.bandwidth==='short'?'short':'long';
  await _aiSlotAcquire(pool);
  try{
    const maxAttempts=5;
    let lastErr;
    for(let attempt=0;attempt<maxAttempts;attempt++){
      try{
        return await _callAIDispatch(system,userMsg,qualityCall,callOpts);
      }catch(e){
        lastErr=e;
        const status=e&&e.status;
        const msg=String(e&&e.message||'');
        const isRateLimit=status===429||/\b429\b|rate.?limit|rate_limit_error/i.test(msg);
        const isOverloaded=status===529||status===503||/overloaded/i.test(msg);
        if(!(isRateLimit||isOverloaded)||attempt===maxAttempts-1)throw e;
        const ra=Number(e&&e.retryAfter);
        const wait=Number.isFinite(ra)&&ra>0
          ? Math.min(90000,Math.max(2000,ra*1000+500))
          : Math.min(60000,(2**attempt)*4000+Math.floor(Math.random()*1500));
        console.warn(`[callAI] ${isRateLimit?'rate limit':'overloaded'} — waiting ${Math.round(wait/1000)}s before retry ${attempt+2}/${maxAttempts}`);
        await _sleep(wait);
      }
    }
    throw lastErr;
  }finally{_aiSlotRelease(pool);}
}

async function _callAIDispatch(system, userMsg, qualityCall=false, callOpts={}){
  const outTok=callOpts.outputTokens!=null?callOpts.outputTokens:(qualityCall?8192:4096);
  // Honor the user's model choice. The previous auto-upgrade silently swapped
  // Haiku→Sonnet on quality calls, multiplying latency 5-8x and routinely hitting
  // OTPM rate limits on findings (six 16K-token calls). If users want Sonnet
  // quality on findings, they can pick it explicitly.
  if(S.provider==='gemini'){
    const model=S.model&&/^gemini-/.test(S.model)?S.model:'gemini-2.5-flash';
    return callGemini(system,userMsg,model,{maxTokens:outTok});
  }
  const model=S.model||'claude-sonnet-4-6';
  return callAnthropic(system,userMsg,model,{maxTokens:outTok});
}

async function callAnthropic(system, userMsg, model, opts={}){
  model=model||S.model;
  const max_tokens=opts.maxTokens!=null?opts.maxTokens:4096;
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,max_tokens,system,messages:[{role:'user',content:userMsg}]}),
  });
  if(!resp.ok){
    const e=await resp.text();
    const err=new Error(`Anthropic error ${resp.status}: ${e}`);
    err.status=resp.status;
    const ra=resp.headers.get('retry-after');
    if(ra)err.retryAfter=parseFloat(ra)||30;
    throw err;
  }
  const d=await resp.json();
  return d.content[0].text;
}

// ── Gemini (free-tier sample mode) ─────────────────────────────────
// Free-tier Gemini Flash: 15 req/min, 1500 req/day. Throttle to ~12 RPM (5s spacing)
// to stay safely under the limit even with parallel callers.
const _GEMINI_MIN_INTERVAL_MS=5000;
let _geminiLastCallAt=0;
async function _geminiThrottle(){
  const now=Date.now();
  const wait=Math.max(0,(_geminiLastCallAt+_GEMINI_MIN_INTERVAL_MS)-now);
  if(wait>0)await _sleep(wait);
  _geminiLastCallAt=Date.now();
}
async function callGemini(system, userMsg, model, opts={}){
  if(!S.geminiApiKey)throw new Error('No Gemini API key set. Get a free key at aistudio.google.com.');
  await _geminiThrottle();
  model=model||'gemini-2.5-flash';
  const max_tokens=opts.maxTokens!=null?opts.maxTokens:4096;
  // Generative Language API. systemInstruction is a separate field; user content goes in `contents`.
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(S.geminiApiKey)}`;
  // The tool's prompts all ask for JSON output. Gemini Flash regularly truncates or
  // produces malformed JSON without structured-output mode — adding responseMimeType
  // forces the model into JSON-only mode and eliminates the truncation/escape errors
  // that previously broke ~75% of doc-analysis and findings-generation calls.
  const body={
    systemInstruction:system?{parts:[{text:system}]}:undefined,
    contents:[{role:'user',parts:[{text:userMsg}]}],
    generationConfig:{maxOutputTokens:max_tokens,temperature:0.4,responseMimeType:'application/json'}
  };
  const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok){
    const e=await resp.text();
    const err=new Error(`Gemini error ${resp.status}: ${e}`);
    err.status=resp.status;
    // Gemini returns 429 with a RetryInfo on quota exhaustion. Surface a friendlier message.
    if(resp.status===429){
      err.retryAfter=30;
      err.message+='\n\nFree-tier quota likely exhausted. Wait a minute and retry, or switch to an Anthropic key for the full assessment.';
    }
    throw err;
  }
  const d=await resp.json();
  // Defensive parsing — Gemini may omit `candidates` if a safety filter trips.
  const cand=d&&d.candidates&&d.candidates[0];
  if(!cand||!cand.content||!cand.content.parts||!cand.content.parts.length){
    const reason=cand?.finishReason||d?.promptFeedback?.blockReason||'unknown';
    throw new Error(`Gemini returned no text (finishReason: ${reason}). Try retrying or switching to a Claude model.`);
  }
  return cand.content.parts.map(p=>p.text||'').join('');
}

async function extractText(file){
  const n=file.name.toLowerCase();
  if(n.endsWith('.pdf'))return extractPDF(file);
  if(n.endsWith('.docx'))return extractDOCX(file);
  return file.text();
}
async function extractPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let t='';
  for(let i=1;i<=Math.min(pdf.numPages,30);i++){
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    t+=tc.items.map(x=>x.str).join(' ')+'\n';
  }
  return t.slice(0,12000);
}
async function extractDOCX(file){
  const buf=await file.arrayBuffer();
  const r=await mammoth.extractRawText({arrayBuffer:buf});
  return r.value.slice(0,12000);
}

// ════════════════════════════════════════════════════════════
// STEP 2: SCOPE — AI-recommended subcategory selection
// ════════════════════════════════════════════════════════════
function renderScope(){
  const excl=new Set(S.excludedSubcategories||[]);
  const rec=S.aiScopeRec||{};
  const total=SC_RAW.length;
  const inScope=SC_RAW.filter(([id])=>!excl.has(id)).length;
  function recBadge(id){
    const r=rec[id];if(!r)return'';
    if(r.action==='include')return`<span class="scope-sc-rec scope-rec-core" title="${escHtml(r.reason||'')}">Core</span>`;
    if(r.action==='optional')return`<span class="scope-sc-rec scope-rec-optional" title="${escHtml(r.reason||'')}">Optional</span>`;
    if(r.action==='exclude')return`<span class="scope-sc-rec scope-rec-low" title="${escHtml(r.reason||'')}">Low priority</span>`;
    return'';
  }
  const fnHtml=FUNCTIONS.map(fn=>{
    const fnScs=SC_BY_FN[fn.id]||[];
    const fnIn=fnScs.filter(id=>!excl.has(id)).length;
    const catHtml=(CATEGORIES[fn.id]||[]).map(catId=>{
      const catScs=SC_BY_CAT[catId]||[];
      const catIn=catScs.filter(id=>!excl.has(id)).length;
      const scHtml=catScs.map(id=>{
        const sc=SC_MAP[id];
        return`<div class="scope-sc">
          <input type="checkbox" data-action="toggle-sc" data-scid="${id}" ${!excl.has(id)?'checked':''}>
          <span class="scope-sc-id">${escHtml(id)}</span>
          <span class="scope-sc-text">${escHtml(sc?sc.text:'')}</span>
          ${recBadge(id)}
        </div>`;
      }).join('');
      const indeterminate=catIn>0&&catIn<catScs.length;
      return`<div class="scope-cat">
        <div class="scope-cat-head">
          <input type="checkbox" data-action="toggle-cat" data-catid="${catId}" ${catIn>0?'checked':''} ${indeterminate?'data-partial="1"':''}>
          <strong style="font-size:.77rem;color:#1a2332">${escHtml(catId)}</strong>
          <span style="font-size:.74rem;color:#5a7a96;flex:1;margin-left:6px">${escHtml(CAT_NAMES[catId]||catId)}</span>
          <span style="font-size:.71rem;color:#5a7a96" data-scope-cat-count="${catId}">${catIn}/${catScs.length}</span>
        </div>
        <div class="scope-cat-body">${scHtml}</div>
      </div>`;
    }).join('');
    const fnIndeterminate=fnIn>0&&fnIn<fnScs.length;
    return`<div class="scope-fn" style="border-color:${fn.color}55">
      <div class="scope-fn-head" style="background:${fn.light}">
        <input type="checkbox" data-action="toggle-fn" data-fnid="${fn.id}" ${fnIn>0?'checked':''} ${fnIndeterminate?'data-partial="1"':''}>
        <span style="font-weight:800;color:${fn.color};font-size:.9rem;min-width:2.6em">${fn.id}</span>
        <span style="font-weight:700;font-size:.92rem;color:#0d2137;flex:1">${fn.name}</span>
        <span style="font-size:.77rem;color:#5a7a96" data-scope-fn-count="${fn.id}">${fnIn}/${fnScs.length} subcategories</span>
      </div>
      <div class="scope-fn-body">${catHtml}</div>
    </div>`;
  }).join('');
  const targetHtml=FUNCTIONS.map(f=>{
    const tv=S.targetFnScores&&S.targetFnScores[f.id]?String(S.targetFnScores[f.id]):'';
    return`<div style="display:flex;align-items:center;gap:14px;padding:10px 14px;border:1.5px solid ${f.color}44;border-radius:8px;background:${f.light}55;flex-wrap:wrap">
      <span style="font-weight:800;color:${f.color};font-size:.85rem;min-width:2.2em">${f.id}</span>
      <span style="font-size:.83rem;color:#1a2332;flex:1;min-width:120px">${f.name}</span>
      <select id="inp-target-${f.id}" style="font-size:.8rem;padding:6px 10px;border:1.5px solid #d0dce8;border-radius:6px;min-width:200px">
        <option value="">Not set</option>
        <option value="2" ${tv==='2'?'selected':''}>2 — Managed (project-level)</option>
        <option value="3" ${tv==='3'?'selected':''}>3 — Defined (org-wide, recommended)</option>
        <option value="4" ${tv==='4'?'selected':''}>4 — Quantitatively Managed</option>
        <option value="5" ${tv==='5'?'selected':''}>5 — Optimizing</option>
      </select>
    </div>`;
  }).join('');
  const hasRec=Object.keys(rec).length>0;
  return`
${topBar(2)}
<div class="container">
  <div class="card">
    <h2>Assessment Scope</h2>
    <p class="sub">Review and adjust the subcategories included in this assessment. ${hasRec?'The AI has pre-flagged subcategories based on your organization profile — hover any badge for the reasoning. You have full control.':'All subcategories are included by default — deselect any that don\'t apply.'}</p>
    ${hasRec?`<div class="alert alert-info" style="margin-bottom:16px"><strong>AI Scope Recommendations</strong> — Subcategories flagged <span class="scope-sc-rec scope-rec-core" style="font-size:.72rem">Core</span> are essential for your profile. <span class="scope-sc-rec scope-rec-optional" style="font-size:.72rem">Optional</span> are situational. <span class="scope-sc-rec scope-rec-low" style="font-size:.72rem">Low priority</span> have been pre-deselected but you can re-include them. Hover any badge to see the AI's reasoning.</div>`:''}
    <div class="scope-summary">
      <div class="scope-stat"><div class="scope-stat-num" id="scope-in-count">${inScope}</div><div class="scope-stat-lbl">In scope</div></div>
      <div class="scope-stat"><div class="scope-stat-num" style="color:#8aa3bc" id="scope-out-count">${total-inScope}</div><div class="scope-stat-lbl">Excluded</div></div>
      <div class="scope-stat"><div class="scope-stat-num" style="color:#1a2332">${total}</div><div class="scope-stat-lbl">Total subcategories</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button type="button" class="btn btn-secondary btn-sm" data-action="scope-include-all">Include all</button>
      ${hasRec?`<button type="button" class="btn btn-secondary btn-sm" data-action="scope-apply-ai-rec">Reset to AI recommendations</button>`:''}
    </div>
    <div id="scope-tree">${fnHtml}</div>
  </div>

  <div class="card">
    <div class="section-label">Target State — Current vs. Desired Maturity (Optional)</div>
    <p style="font-size:.83rem;color:#5a7a96;margin-bottom:14px">Set a desired CMMI score per function to include a <strong>current vs. target gap analysis</strong> in the report. Leave unset to skip.</p>
    <div style="display:flex;flex-direction:column;gap:8px">${targetHtml}</div>
    <p style="font-size:.76rem;color:#7a9ab8;margin-top:10px">Most organizations target CMMI 3 (Defined) as a practical baseline. Heavily regulated sectors often target 3–4.</p>
  </div>

  <div style="display:flex;justify-content:space-between;margin-bottom:32px">
    <button class="btn btn-secondary" data-action="goto-setup">← Back</button>
    <button class="btn btn-primary" data-action="scope-next">Continue to Document Upload (${subcategoriesInScopeCount()} subcategories in scope) →</button>
  </div>
</div>
<script>
(function(){
  document.querySelectorAll('[data-partial="1"]').forEach(el=>{el.indeterminate=true;});
})();
<\/script>`;
}

// STEP 3: DRL
// ════════════════════════════════════════════════════════════
function renderDRL(){
  ensureDrlViewFns();
  const catsShow=drlCatsForTable();
  const st=drlStats(true);
  const pct=st.total?Math.round(st.addressed/st.total*100):0;
  const fnFilterCard=`<div class="card drl-fn-filter-card">
    <div class="drl-fn-filter-label">Show evidence for</div>
    <p class="drl-fn-filter-hint">Pick one or more CSF functions to narrow the table and the progress counts above. <strong>Analyze Evidence</strong> runs only on visible rows and clears prior document-based evidence each time—select every function you want in that pass, or run again after switching.</p>
    <div class="drl-fn-filter-row" style="margin-bottom:8px">
      <button type="button" class="btn btn-sm btn-secondary" data-action="drl-view-all-fns" ${drlViewCoversAllIncluded()?'disabled':''}>Show all functions</button>
      ${drlViewCoversAllIncluded()?'<span style="font-size:.72rem;color:#5a7a96">All functions in scope are shown.</span>':''}
    </div>
    <div class="drl-fn-filter-row">${S.includedFns.map(fid=>{
      const f=FUNCTIONS.find(x=>x.id===fid);
      if(!f)return'';
      const on=S.drlViewFns.includes(fid);
      return`<button type="button" class="drl-fn-pill ${on?'is-on':''}" data-action="drl-toggle-viewfn" data-fn="${fid}" style="border-color:${on?f.color:'#d0dce8'};background:${on?f.light:'#fff'};color:${on?f.color:'#5a7a96'}" title="${on?'Click to hide':'Click to show'} ${escHtml(f.name)} evidence rows">${escHtml(fid)} <span class="drl-fn-pill-name">${escHtml(f.name)}</span></button>`;
    }).join('')}</div>
  </div>`;
  return`
${topBar(3)}
<div class="container container-drl">
  <div class="card">
    <h2>Document Upload — Evidence Collection</h2>
    <p class="sub" style="font-size:.78rem;color:#1e88e5;margin-bottom:4px"><strong>${subcategoriesInScopeCount()} subcategories in scope</strong> across ${FUNCTIONS.filter(f=>S.includedFns.includes(f.id)).length} functions${(S.excludedSubcategories||[]).length>0?` · <span style="color:#8aa3bc">${S.excludedSubcategories.length} excluded</span>`:` · Full catalog`}</p>
    <p class="sub">For each document request below, upload one or more files and provide context for each file. If a request is not applicable, mark "Not provided" and explain why.</p>
    <div class="progress-ring">
      <div style="font-size:.83rem;font-weight:600;color:#2c4a6a;white-space:nowrap">${st.addressed} / ${st.total} evidence requests done</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:.83rem;color:#5a7a96;white-space:nowrap">${st.totalFiles} file${st.totalFiles!==1?'s':''} uploaded</div>
    </div>
    <p class="sub" style="margin-top:0;font-size:.78rem;color:#5a7a96;line-height:1.45">This page counts <strong>${st.total}</strong> evidence <strong>requests</strong> (artifact rows in your current table). After analysis, the tool scores <strong>${subcategoriesInScopeCount()}</strong> CSF <strong>subcategories</strong> in your scope — finer outcome-level statements (${subcategoriesInScopeCount()} is larger because one policy or log export can support many subcategories).</p>
    <div class="alert alert-info">💡 Supported formats: PDF, Word (.docx), and plain text. Each uploaded file requires context. For non-applicable requests, select "Not provided" and explain (e.g., on-prem control not applicable in all-cloud environment).</div>
    ${S.drlValidationErrors?.length?`<div class="alert alert-warn"><strong>Complete these before analysis:</strong><ul style="margin-top:6px;padding-left:18px">${S.drlValidationErrors.slice(0,12).map(e=>`<li style="margin-bottom:3px">${escHtml(e)}</li>`).join('')}</ul>${S.drlValidationErrors.length>12?`<div style="margin-top:4px;font-size:.78rem">+ ${S.drlValidationErrors.length-12} more...</div>`:''}</div>`:''}
  </div>
  ${fnFilterCard}

  <div class="drl-page-split">
    <div class="drl-sc-rail">
      <button type="button" class="drl-sc-fab" data-action="toggle-sc-sidebar" aria-expanded="false" title="Show or hide the CSF 2.0 subcategory inventory (${subcategoriesInScopeCount()} in your scope of ${SC_RAW.length} in catalog)">▶</button>
    </div>
    <aside id="drl-sc-sidebar" class="drl-sc-sidebar collapsed" aria-label="NIST CSF 2.0 subcategory inventory">
      <div class="drl-sc-sidebar-head">
        <span><strong>CSF subcategories</strong> <span class="drl-sc-count">${subcategoriesInScopeCount()} in scope</span> <span class="drl-sc-count" style="color:#8aa3bc">(${SC_RAW.length} in tool)</span></span>
        <button type="button" class="drl-sc-close" data-action="toggle-sc-sidebar" title="Collapse sidebar" aria-label="Collapse">×</button>
      </div>
      <div class="drl-sc-sidebar-scroll">${renderScInventorySidebarInnerHtml()}</div>
    </aside>
    <div class="drl-sc-main">
  <div class="drl-table-wrap">
    <table class="drl-master">
      <thead>
        <tr>
          <th class="drl-th-fn">Function</th>
          <th class="drl-th-cat">Category</th>
          <th class="drl-th-req">Requested item</th>
          <th class="drl-th-up">Upload</th>
          <th class="drl-th-ctx">Context (per file)</th>
          <th class="drl-th-np">Not provided</th>
        </tr>
      </thead>
      <tbody>
        ${catsShow.map(cat=>{
          const n=cat.requests.length;
          return cat.requests.map((req,i)=>{
            const e=getDrlEntry(cat.id,req.id);
            const rowCls=(e.files.length||e.notProvided)?'drl-cat-done':'';
            const fileList=e.files.length?`<div class="file-list">${e.files.map((f,idx)=>`<div class="file-item"><span>📄 ${escHtml(f.name)}</span><span class="rm" data-action="remove-file" data-cat="${cat.id}" data-req="${req.id}" data-idx="${idx}">✕</span></div><div class="req-context"><textarea data-action="set-file-context" data-cat="${cat.id}" data-req="${req.id}" data-idx="${idx}" placeholder="What this file shows; scope; timeframe (for AI).">${escHtml(f.context||'')}</textarea></div>`).join('')}</div>`:'';
            const contextCol=e.notProvided?`<td class="drl-td-ctx"><span class="drl-cell-muted">—</span></td>`:`<td class="drl-td-ctx">${fileList||'<span class="drl-cell-muted">Add files, then context per file.</span>'}</td>`;
            const uploadCol=e.notProvided?`<td class="drl-td-up"><span class="drl-cell-muted">—</span></td>`:`<td class="drl-td-up"><div class="drop-zone drl-drop-zone" data-dropzone="1" data-cat="${cat.id}" data-req="${req.id}" onclick="document.getElementById('fi-${cat.id}-${req.id}').click()" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event,'${cat.id}','${req.id}')">📎 Add files</div>
              <input type="file" id="fi-${cat.id}-${req.id}" multiple accept=".pdf,.docx,.txt" style="display:none" onchange="handleFileInput(event,'${cat.id}','${req.id}')"></td>`;
            const npCol=`<td class="drl-td-np">
            <label class="drl-np-label"><input type="checkbox" data-action="toggle-not-provided" data-cat="${cat.id}" data-req="${req.id}" ${e.notProvided?'checked':''}><span>Not provided</span></label>
            ${e.notProvided?`<div class="np-box"><textarea data-action="set-not-provided-reason" data-cat="${cat.id}" data-req="${req.id}" rows="3" placeholder="Why not provided (e.g., all-cloud — on-prem artifact N/A). Min. 10 characters.">${escHtml(e.notProvidedReason||'')}</textarea></div>`:`<p class="drl-np-hint">If this request does not apply, check the box and explain why.</p>`}
            </td>`;
            const fnCell=i===0?`<td rowspan="${n}" class="drl-td-fn">${drlFunctionContextHtml(cat,S.drlViewFns)}</td>`:'';
            const catCell=i===0?`<td rowspan="${n}" class="drl-td-cat">${drlCategoryContextHtml(cat,S.drlViewFns)}</td>`:'';
            return`<tr class="${rowCls}">${fnCell}${catCell}
            <td class="drl-td-req"><div class="req-title">${req.title}</div><div class="req-hint">${req.hint}</div></td>
            ${uploadCol}
            ${contextCol}
            ${npCol}
            </tr>`;
          }).join('');
        }).join('')}
      </tbody>
    </table>
  </div>
    </div>
  </div>

  <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin:24px 0 32px;align-items:center">
    <button class="btn btn-secondary" data-action="goto-scope">← Back to Scope</button>
    <button class="btn btn-primary" data-action="drl-analyze">🤖 Analyze Evidence Package →</button>
  </div>
</div>`;
}

// ════════════════════════════════════════════════════════════
// STEP 4: ANALYSIS RESULTS
// ════════════════════════════════════════════════════════════
function renderAnalysis(){
  ensureDrlViewFns();
  const drlReqTotal=allRequestsForView().length;
  const allScs=SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])).map(x=>x[0]);
  const scScope=allScs.length;
  const qMap=id=>(S.evidenceMap[id]?.quality)||'missing';
  const counts={strong:0,adequate:0,weak:0,missing:0};
  allScs.forEach(id=>counts[qMap(id)]++);
  return`
${topBar(4)}
<div class="container">
  <div class="card">
    <h2>Evidence Analysis Complete</h2>
    <p class="sub">The AI has mapped your documents to NIST CSF 2.0 subcategories. Review the coverage below, then generate your targeted questionnaire.</p>
    <p class="sub" style="margin-top:-8px;font-size:.79rem;color:#1e88e5"><strong>${subcategoriesInScopeCount()} subcategories in scope</strong> across ${FUNCTIONS.filter(f=>S.includedFns.includes(f.id)).length} functions${(S.excludedSubcategories||[]).length>0?` · <span style="color:#8aa3bc">${S.excludedSubcategories.length} excluded via scope selection</span>`:''}</p>
    <p class="sub" style="margin-top:-8px;font-size:.78rem;color:#5a7a96;line-height:1.45">The tables below add up to <strong>${scScope}</strong> CSF <strong>subcategories</strong> in your scope (each row’s <strong>Total</strong> is how many subcategories sit in that category). That is different from the <strong>${drlReqTotal}</strong> evidence <strong>requests</strong> on Document Upload: those rows are the artifact checklist; subcategories are the finer outcomes the model rates from your whole evidence package.</p>
    <div class="row" style="margin-bottom:24px">
      <div class="stat-card col"><div class="stat-num" style="color:#2e7d32">${counts.strong}</div><div class="stat-lbl">Strong Evidence</div></div>
      <div class="stat-card col"><div class="stat-num" style="color:#1e88e5">${counts.adequate}</div><div class="stat-lbl">Adequate Evidence</div></div>
      <div class="stat-card col"><div class="stat-num" style="color:#e65100">${counts.weak}</div><div class="stat-lbl">Weak Evidence</div></div>
      <div class="stat-card col"><div class="stat-num" style="color:#c62828">${counts.missing}</div><div class="stat-lbl">No Evidence</div></div>
    </div>
    ${counts.missing+counts.weak>0?`<div class="alert alert-warn">⚠️ ${counts.missing+counts.weak} subcategories have missing or weak evidence — the questionnaire will focus on these areas.</div>`:''}
  </div>

  ${FUNCTIONS.filter(f=>S.includedFns.includes(f.id)).map(fn=>`
  <div class="card" style="padding:20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:4px;height:24px;background:${fn.color};border-radius:2px"></div>
      <h3 style="font-size:1rem;font-weight:700;color:${fn.color}">${fn.id} — ${fn.name}</h3>
    </div>
    <table class="evidence-table">
      <thead><tr><th>Category</th><th>Total</th><th>Strong</th><th>Adequate</th><th>Weak</th><th>Missing</th></tr></thead>
      <tbody>${CATEGORIES[fn.id].filter(cat=>SC_BY_CAT[cat]).map(cat=>{
        const scs=SC_BY_CAT[cat]||[];
        const cs={strong:0,adequate:0,weak:0,missing:0};
        scs.forEach(id=>cs[qMap(id)]=(cs[qMap(id)]||0)+1);
        return`<tr>
          <td><strong>${CAT_NAMES[cat]}</strong><br><span style="font-size:.72rem;color:#7a9ab8">${cat}</span></td>
          <td style="text-align:center">${scs.length}</td>

function renderQuestion(qu,qi){

  const l5=['1 — Never / Not at all','2 — Rarely / Minimal','3 — Sometimes / Partial','4 — Usually / Mostly','5 — Always / Fully'];

const CONSULT_EMAIL='nistcsftool@gmail.com';
function _topGapsRanked(){
  const _excl=new Set(S.excludedSubcategories||[]);
  return Object.entries(S.findings||{})
    .filter(([id,f])=>f&&S.includedFns.includes(id.split('.')[0])&&!_excl.has(id)&&f.status!=='not_analyzed')
    .map(([id,f])=>({id,f,rs:(f.likelihood||1)*(f.impact||1),cmmi:f.cmmi_score||0}))
    .sort((a,b)=>{
      // Primary: highest risk score. Secondary: lowest CMMI. Tertiary: lower LOE first
      // (low LOE = quicker remediation, higher upsell appeal).
      if(b.rs!==a.rs)return b.rs-a.rs;
      if(a.cmmi!==b.cmmi)return a.cmmi-b.cmmi;
      const loO={low:0,medium:1,high:2};
      return(loO[a.f.loe||'medium']||1)-(loO[b.f.loe||'medium']||1);
    })
    .slice(0,5);
}

Scope: ${(S.org.scope||'').slice(0,400)}

Top 5 risk-ranked findings (already prioritized by Likelihood × Impact):

Return JSON in this exact shape:

Order top_gaps in the same order as the input findings.`;
    const raw=await callAI(sys,usr,true,{outputTokens:2400});

  }catch(e){

    await uiAlert('Could not generate the plain-English summary: '+(e.message||e)+'\n\nThe raw findings will still be shown below.');

}

function renderRadar(fns,fnScores){
  const cx=180,cy=180,r=130,n=fns.length,max=5;
  let rings='',axes='',labels='',poly='';
  [1,2,3,4,5].forEach(l=>{const pts=fns.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,d=r*(l/max);return`${cx+Math.cos(a)*d},${cy+Math.sin(a)*d}`;}).join(' ');rings+=`<polygon points="${pts}" fill="none" stroke="#e0eaf4" stroke-width="1"/>`;});
  fns.forEach((fn,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;axes+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*r}" y2="${cy+Math.sin(a)*r}" stroke="#e0eaf4" stroke-width="1"/>`;labels+=`<text x="${cx+Math.cos(a)*r*1.15}" y="${cy+Math.sin(a)*r*1.15+5}" text-anchor="middle" font-size="11" font-weight="700" fill="${fn.color}">${fn.id}</text>`;});
  const pts=fns.map((fn,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(fnScores[fn.id]||0)/max;return`${cx+Math.cos(a)*r*v},${cy+Math.sin(a)*r*v}`;}).join(' ');
  poly=`<polygon points="${pts}" fill="rgba(30,136,229,.15)" stroke="#1e88e5" stroke-width="2"/>`;
  fns.forEach((fn,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(fnScores[fn.id]||0)/max;poly+=`<circle cx="${cx+Math.cos(a)*r*v}" cy="${cy+Math.sin(a)*r*v}" r="4" fill="${fn.color}"/>`;});
  return`<svg viewBox="0 0 360 360" style="width:100%;max-width:320px;display:block;margin:0 auto">${rings}${axes}${poly}${labels}</svg>`;
}
