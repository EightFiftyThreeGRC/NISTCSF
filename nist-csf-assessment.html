async function analyzeDocuments(){
  const errs=validateDRL();
  S.drlValidationErrors=errs;
  if(errs.length){saveState();render();await uiAlert(`Please address ${errs.length} evidence request issue(s) before analysis.`);return;}
  S.evidenceMap={};S.docSummaries=[];
  // In-scope set used to (a) build the prompt's subcategory list and (b) reject any
  // out-of-scope IDs the model invents — fixes off-by-N drift in the evidence map.
  const _excl=new Set(S.excludedSubcategories||[]);
  const _inScopeId=(id)=>S.includedFns.includes(id.split('.')[0])&&!_excl.has(id);
  try{
    const scList=SC_RAW.filter(([id])=>_inScopeId(id)).map(([id,text])=>`${id}: ${text}`).join('\n');
    ensureDrlViewFns();
    // Flatten everything into a single task list. Document analysis is independent
    // per-file; the previous serial loop wasted minutes waiting on Anthropic round-trips.
    const tasks=[];
    for(const cat of drlCatsForTable()){
      for(const req of cat.requests){
        const entry=getDrlEntry(cat.id,req.id);
        if(entry.notProvided){
          S.docSummaries.push({catId:cat.id,requestId:req.id,name:req.title,summary:`Not provided: ${entry.notProvidedReason}`,mappings:{}});
          continue;
        }
        for(const file of(entry.files||[]))tasks.push({cat,req,file});
      }
    }
    const total=tasks.length;
    let done=0;
    setLoading(`Analyzing 0 / ${total} documents…`,'Files run in parallel (concurrency cap honors API rate limits). Much faster than the old per-file serial path.');
    const rank={strong:3,adequate:2,weak:1,missing:0};
    const sys=`You are a NIST CSF 2.0 expert assessor. Analyze the document excerpt and identify which CSF 2.0 subcategories it provides evidence for. Return ONLY valid JSON, no markdown.`;
    await Promise.allSettled(tasks.map(async ({cat,req,file})=>{
      const msg=`Document category: ${cat.name}\nRequested artifact: ${req.title}\nDocument: ${file.name}\nUploader context: ${file.context||'None provided'}\n\nContent:\n${file.content.slice(0,6000)}\n\nSubcategories:\n${scList}\n\nReturn JSON:\n{"document_type":"policy|procedure|risk_register|asset_inventory|training|architecture|contract|audit|other","document_summary":"one sentence","mappings":{"SC_ID":{"evidence_quality":"strong|adequate|weak","excerpt":"relevant text max 150 chars","notes":"why this supports the subcategory"}}}`;
      try{
        // bandwidth:'short' opts into the fan-out pool (limit 4). Bumped output budget
        // to 8192 — comprehensive policies map to 30+ subcategories with excerpts/notes.
        const raw=await callAI(sys,msg,false,{outputTokens:8192,bandwidth:'short'});
        const p=parseJSON(raw);
        S.docSummaries.push({catId:cat.id,requestId:req.id,name:file.name,summary:p.document_summary,mappings:p.mappings||{}});
        Object.entries(p.mappings||{}).forEach(([scId,ev])=>{
          if(!_inScopeId(scId))return; // ignore out-of-scope IDs the model may invent
          if(!S.evidenceMap[scId])S.evidenceMap[scId]={quality:'missing',excerpts:[]};
          if((rank[ev.evidence_quality]||0)>(rank[S.evidenceMap[scId].quality]||0))S.evidenceMap[scId].quality=ev.evidence_quality;
          if(ev.excerpt)S.evidenceMap[scId].excerpts.push(`[${file.name}] ${ev.excerpt}`);
        });
      }catch(e){
        console.warn('Doc error:',file.name,e);
        // Surface the failure in the UI so users notice when a doc was dropped.
        S.docSummaries.push({catId:cat.id,requestId:req.id,name:file.name,summary:`⚠️ Analysis failed: ${e.message||e}`,mappings:{},error:true});
      }finally{
        done++;
        setLoading(`Analyzing ${done} / ${total} documents…`,'Files run in parallel (concurrency cap honors API rate limits).');
      }
    }));
    SC_RAW.filter(([id])=>_inScopeId(id)).forEach(([id])=>{if(!S.evidenceMap[id])S.evidenceMap[id]={quality:'missing',excerpts:[]};});
    S.drlValidationErrors=[];
    S.step='analysis';saveState();
  }finally{clearLoading();render();}
}

async function generateQuestionnaire(){
  setLoading('Generating targeted questionnaire…','This step often takes a few minutes (roughly 2 to 5 is typical; it can reach about 10 with a large scope, a slower model, or busy APIs). Leave this tab open until the questionnaire appears.');
  try{
    const GAP_CAP=12000;
    const CONF_CAP=6000;
    // Honor subcategory-level scope exclusions (the function-level filter alone wasn't enough —
    // excluded subs like GV.RM-07 fell into the "missing" bucket and the model asked about them).
    const _excl=new Set(S.excludedSubcategories||[]);
    const _inScope=([id])=>S.includedFns.includes(id.split('.')[0])&&!_excl.has(id);
    let gaps=SC_RAW.filter(_inScope).filter(([id])=>['missing','weak'].includes(S.evidenceMap[id]?.quality)).map(([id,text])=>`${id}: ${text}`).join('\n');
    if(gaps.length>GAP_CAP)gaps=gaps.slice(0,GAP_CAP)+'\n\n(... gap list truncated for length; prioritize the highest-risk gaps implied above.)';
    let confirmed=SC_RAW.filter(_inScope).filter(([id])=>['strong','adequate'].includes(S.evidenceMap[id]?.quality)).map(([id])=>id).join(', ');
    if(confirmed.length>CONF_CAP)confirmed=confirmed.slice(0,CONF_CAP)+' ...';
    // Industry-specific common gaps to sharpen question targeting
    const indGaps=(INDUSTRY_COMMON_GAPS[S.org.industry]||[]).map(c=>`${c} (${CAT_NAMES[c]||c})`).join(', ');
    const sys=`You are a senior NIST CSF 2.0 assessor conducting a ${S.org.industry} sector assessment. You produce questionnaires that reveal the difference between paper compliance and actual operational practice. Output a single JSON object only (no markdown, no commentary). Question text under 200 characters; guidance one short sentence only.`;
    const msg=`Organization: ${S.org.name} | Industry: ${S.org.industry} | Size: ${S.org.orgSize||'Unknown'} employees\nIT team: ${S.org.itOrgSize||'Unknown'} | Cybersecurity team: ${S.org.cyberOrgSize||'Unknown'}\nScope: ${S.org.scope||'Enterprise-wide'}\n\nEvidence GAPS — subcategories with missing or weak document coverage (focus questions here):\n${gaps}\n\nAlready confirmed via documents (do NOT re-ask these): ${confirmed}\n\n${indGaps?`Historically weak areas in ${S.org.industry} sector (pay particular attention): ${indGaps}\n\n`:''}Generate a questionnaire with 18-28 questions total. Methodology:\n- Group by role: CISO/Security Lead, IT Lead, Risk Manager, HR Lead, Business Continuity Lead\n- PRIORITIZE scenario-based and behavioral questions over self-rating (e.g. "Walk me through what happens when X…" or "When did you last do Y?")\n- Reveal paper vs. practice gaps — what policies say vs. what staff actually do day to day\n- Incorporate ${S.org.industry}-specific context (regulatory requirements, supply chain risk, operational dependencies)\n- Each question maps to 1–3 specific subcategory IDs\n- Do NOT re-ask what documents already confirm\n- Use freetext for governance/process questions where nuance matters; likert5 for consistency/frequency; yesno/multichoice only when the answer is genuinely categorical\n- Keep options arrays short (max 5 options)\n\nReturn this JSON shape:\n{"roles":[{"role":"CISO / Security Lead","description":"short context sentence","questions":[{"id":"Q1","text":"max ~200 chars","type":"likert5|likert3|yesno|multichoice|freetext","options":["opt1"],"subcategories":["GV.OC-01"],"guidance":"one sentence on why we ask this"}]}]}`;
    const raw=await callAI(sys,msg,true,{outputTokens:16384,jsonMime:providerSupportsJsonMime()});
    const parsed=parseJSON(raw);
    // Defensive: drop any question whose subcategories are all excluded or out-of-function-scope.
    if(parsed&&Array.isArray(parsed.roles)){
      parsed.roles.forEach(r=>{
        r.questions=(r.questions||[]).filter(q=>{
          const subs=q.subcategories||[];
          if(!subs.length)return true;
          return subs.some(s=>!_excl.has(s)&&S.includedFns.includes(String(s).split('.')[0]));
        });
      });
      parsed.roles=parsed.roles.filter(r=>(r.questions||[]).length>0);
    }
    S.questionnaire=parsed;S.activeRole=0;S.step='questionnaire';saveState();
  }catch(e){
    clearLoading();render();
    await uiAlert('Error generating questionnaire: '+e.message);
  }finally{clearLoading();render();}
}

async function fetchFindingsForFunction(fn,answersStructured){
  const _excl=new Set(S.excludedSubcategories||[]);
  const scs=(SC_BY_FN[fn.id]||[]).filter(id=>!_excl.has(id));
  if(!scs.length)return{};
  // Group by category (e.g. GV.OC, GV.RM, ...). Each chunk has 2-7 subs which
  // bounds output to ~3-8KB per call — well within any model's token budget,
  // and lets one bad chunk fail without taking the whole function down.
  const byCat={};
  scs.forEach(id=>{const c=id.split('-')[0];(byCat[c]=byCat[c]||[]).push(id);});
  const chunks=Object.values(byCat);
  const results=await Promise.allSettled(chunks.map(chunk=>
    fetchFindingsForChunk(fn,chunk,answersStructured)
  ));
  const merged={};
  const errs=[];
  results.forEach((r,i)=>{
    if(r.status==='fulfilled'&&r.value){Object.assign(merged,r.value);}
    else{errs.push({chunk:chunks[i].join(','),err:r.reason?.message||String(r.reason)});}
  });
  // Always return both findings AND error info so the caller can mark partial
  // failures. (Throwing only on total failure left subs from individual failed
  // chunks invisible — they showed up as "Not analyzed" with no reason.)
  return {findings:merged,errors:errs};
}

async function fetchFindingsForChunk(fn,scs,answersStructured){
  if(!scs.length)return{};
  const fnScSet=new Set(scs);
  const scDetails=scs.map(id=>{
    const sc=SC_MAP[id];const ev=S.evidenceMap[id];
    const excerpts=(ev?.excerpts||[]).slice(0,3).map(e=>`    • ${e}`).join('\n')||'    • (no document excerpts)';
    return`${id}: ${sc.text}\n  Evidence quality: ${ev?.quality||'missing'}\n  Document excerpts:\n${excerpts}`;
  }).join('\n\n');
  const relevantQA=(answersStructured||[])
    .filter(qa=>(qa.subcategories||[]).some(s=>fnScSet.has(s)))
    .map(qa=>`[${qa.qid}] Q: "${qa.text}"\n  Answer: ${qa.answer}\n  Maps to: ${qa.subcategories.join(', ')}`)
    .join('\n\n');
  const sys=`You are a NIST CSF 2.0 assessor generating detailed, evidence-grounded assessment findings. Return ONLY valid JSON — no markdown, no commentary.`;
  const msg=`Org: ${S.org.name} | Industry: ${S.org.industry} | Size: ${S.org.orgSize||'Unknown'} employees | IT: ${S.org.itOrgSize||'Unknown'} | Cyber team: ${S.org.cyberOrgSize||'Unknown'}
Scope: ${S.org.scope||'Enterprise-wide'}
FUNCTION: ${fn.id} — ${fn.name}

═══ EVIDENCE PER SUBCATEGORY (this batch) ═══
${scDetails}

═══ RELEVANT QUESTIONNAIRE RESPONSES ═══
${relevantQA||'(No questionnaire responses captured for this batch)'}

═══ INSTRUCTIONS ═══
Generate findings for the ${scs.length} subcategories listed above (${scs.join(', ')}).

RATIONALE FORMAT (critical): Your rationale MUST cite specific sources. Name documents by their exact filename from excerpts (e.g. "The [Network Architecture v2.pdf] shows..."). Reference questionnaire responses by ID (e.g. "When asked [Q4], the respondent stated..."). Then explain WHY the evidence does or does not support a higher score.

CMMI scores: use 0.25-point increments (1.0, 1.25, 1.5 … 5.0).
CMMI: 1=Initial/ad hoc  2=Managed/project-level  3=Defined/org-wide  4=Quantitative  5=Optimizing
Tier: derive from CMMI (<1.75=T1, <2.75=T2, <3.75=T3, ≥3.75=T4)

LIKELIHOOD (1–5): probability that this gap is exploited or causes harm in the next 12 months.
IMPACT (1–5): severity of harm to the organization if the gap materializes.
LOE: "low" = days-to-weeks, "medium" = 1-3 months, "high" = 3+ months.

Return JSON — every subcategory in this batch must appear:
{"${scs[0]}":{"current_state":"...","gaps":"...","cmmi_score":2.25,"tier_score":2,"rationale":"Cite [DocumentName] and [Qx]: ...","recommendation":"...","priority":"high|medium|low","likelihood":3,"impact":4,"loe":"medium","loe_detail":"Estimated time/effort description","remediation_summary":"Brief: what needs to be done"}}`;
  // Use the short pool — chunks are smaller so we can fan out widely.
  // 4096 tokens is enough for ~7 subcategories worth of findings.
  const raw=await callAI(sys,msg,true,{outputTokens:4096,jsonMime:providerSupportsJsonMime(),bandwidth:'short'});
  return parseJSON(raw);
}

async function runCriticPassForFunction(fn){
  const _excl=new Set(S.excludedSubcategories||[]);
  const scs=(SC_BY_FN[fn.id]||[]).filter(id=>!_excl.has(id));
  const maxByQuality={strong:5,adequate:3.5,weak:2.5,missing:1.5};
  let adjusted=0;
  scs.forEach(id=>{
    const f=S.findings[id];if(!f)return;
    const ev=S.evidenceMap[id];
    const cap=maxByQuality[ev?.quality||'missing']||1.5;
    if((f.cmmi_score||0)>cap){
      const old=f.cmmi_score;
      f.cmmi_score=cap;
      f.critic_note=`Score adjusted from ${old} → ${cap} (evidence quality "${ev?.quality||'missing'}" caps at ${cap}).`;
      adjusted++;
    }
  });
  return adjusted;
}

async function generateNarrativeForFunction(fn,fnScore){
  const _excl=new Set(S.excludedSubcategories||[]);
  const scs=(SC_BY_FN[fn.id]||[]).filter(id=>!_excl.has(id));
  if(!scs.length)return;
  const sorted=[...scs].map(id=>({id,score:S.findings[id]?.cmmi_score})).filter(x=>x.score!=null).sort((a,b)=>b.score-a.score);
  const top=sorted.slice(0,3).map(x=>`${x.id} (${fmtScore(x.score)})`).join(', ');
  const bot=sorted.slice(-3).reverse().map(x=>`${x.id} (${fmtScore(x.score)})`).join(', ');
  const tier=fnScore!=null?tierLabel(fnScore):'unscored';
  const sys=`You are a NIST CSF 2.0 assessment expert writing an executive summary for a cybersecurity assessment report. Write clearly and confidently for a board-level audience.`;
  const msg=`Write ONE concise executive paragraph (5–7 sentences) for the ${fn.id} — ${fn.name} function for ${escHtml(S.org.name)} (${S.org.industry} sector, ${S.org.orgSize||'unknown size'}).
Assessment scope: ${S.org.scope||'Enterprise-wide'}.

Overall function score: ${fnScore!=null?fmtScore(fnScore):'N/A'} / 5.0 — ${tier}
Strongest subcategories: ${top||'none'}
Weakest subcategories: ${bot||'none'}
Function description: ${fn.desc}

The paragraph must:
1. Open by stating the function's overall maturity level in plain language
2. Acknowledge 1–2 areas of relative strength with brief specifics
3. Clearly name 2–3 material gaps that elevate organizational risk
4. Close with one prioritised, actionable recommendation

Do NOT use bullet points, headers, or markdown. Return plain text only — the paragraph itself, nothing else.`;
  try{
    const raw=await callAI(sys,msg,false,{outputTokens:512});
    S.functionNarratives[fn.id]=(raw||'').trim();
  }catch(e){console.warn(`[Narrative] ${fn.id} failed (non-fatal):`,e.message);}
}

async function runRiskEnrichmentPass(){
  const fns=FUNCTIONS.filter(f=>S.includedFns.includes(f.id));
  let enriched=0;
  await Promise.allSettled(fns.map(async fn=>{
    const _excl2=new Set(S.excludedSubcategories||[]);
    const scs=(SC_BY_FN[fn.id]||[]).filter(id=>!_excl2.has(id));
    const needsEnrichment=scs.filter(id=>S.findings[id]&&(S.findings[id].likelihood==null||S.findings[id].impact==null||!S.findings[id].loe));
    if(!needsEnrichment.length)return;
    const scList=needsEnrichment.map(id=>{
      const f=S.findings[id];
      return`${id}: cmmi=${fmtScore(f.cmmi_score)}, gaps="${(f.gaps||'').slice(0,120)}"`;
    }).join('\n');
    const sys=`You are a NIST CSF 2.0 risk analyst. Return ONLY valid JSON — no markdown, no commentary.`;
    const msg=`For the following subcategories in ${fn.id} — ${fn.name} (${S.org.name}, ${S.org.industry}), provide risk enrichment fields.

${scList}

LIKELIHOOD (1–5): probability the gap is exploited or causes harm in the next 12 months.
IMPACT (1–5): severity of harm if the gap materializes.
LOE: "low" = days-to-weeks, "medium" = 1-3 months, "high" = 3+ months.

Return JSON keyed by subcategory ID:
{"${needsEnrichment[0]}":{"likelihood":3,"impact":4,"loe":"medium","loe_detail":"Estimated 4-6 weeks to implement policy and tooling","remediation_summary":"Brief description of what needs to be done"}}`;
    try{
      const raw=await callAI(sys,msg,true,{outputTokens:3000,jsonMime:providerSupportsJsonMime()});
      const parsed=parseJSON(raw);
      if(parsed&&typeof parsed==='object'){
        Object.entries(parsed).forEach(([id,data])=>{
          if(S.findings[id]&&data){
            if(data.likelihood!=null)S.findings[id].likelihood=data.likelihood;
            if(data.impact!=null)S.findings[id].impact=data.impact;
            if(data.loe)S.findings[id].loe=data.loe;
            if(data.loe_detail)S.findings[id].loe_detail=data.loe_detail;
            if(data.remediation_summary)S.findings[id].remediation_summary=data.remediation_summary;
            enriched++;
          }
        });
      }
    }catch(e){console.warn(`[RiskEnrich] ${fn.id} failed:`,e.message);}
  }));
  saveState();
  return enriched;
}

async function generateFindings(){
  const fns=FUNCTIONS.filter(f=>S.includedFns.includes(f.id));
  const n=fns.length;
  setLoading(`Step 1/3 — Generating findings (${n} parallel requests)…`,`Each CSF function runs in parallel. Plan on 2–5 minutes. Keep this tab open.`);
  S.findings={};S.functionNarratives={};
  try{
    const allQuestions=S.questionnaire?.roles?.flatMap(r=>r.questions)||[];
    const answersStructured=Object.entries(S.answers).map(([qid,val])=>{
      const q=allQuestions.find(qu=>qu.id===qid);
      if(!q)return null;
      return{qid,text:q.text,answer:String(val),subcategories:q.subcategories||[]};
    }).filter(Boolean);

    // ── Phase 1: initial findings (parallel per function, chunked by category) ──
    const settled=await Promise.allSettled(fns.map(fn=>fetchFindingsForFunction(fn,answersStructured)));
    let ok=0;
    const _exclF=new Set(S.excludedSubcategories||[]);
    const friendlyReason=(reason)=>{
      const msg=reason?.message?reason.message:String(reason||'unknown error');
      const truncated=/truncated|max_tokens|JSON|position \d/i.test(msg);
      return truncated
        ? `Model output was truncated before this batch's findings could be parsed. Click "Retry findings" to try again — chunking will retry just the missing categories.`
        : msg;
    };
    settled.forEach((res,i)=>{
      const fnId=fns[i]?.id;
      const inScopeForFn=(SC_BY_FN[fnId]||[]).filter(id=>!_exclF.has(id));
      if(res.status==='fulfilled'&&res.value&&typeof res.value==='object'){
        // New return shape: {findings, errors}. Fall back to old shape (plain map) too.
        const parsed=res.value.findings||res.value;
        const errs=res.value.errors||[];
        if(parsed&&typeof parsed==='object'){
          Object.assign(S.findings,parsed);
          Object.keys(parsed).forEach(id=>{if(S.findings[id]&&!S.findings[id].status)S.findings[id].status='pending';});
          if(Object.keys(parsed).length>0)ok++;
        }
        // Cover any in-scope sub that didn't get a finding (chunk failure).
        const firstErr=errs.length?errs[0].err:'this batch failed silently';
        inScopeForFn.forEach(id=>{
          if(S.findings[id])return;
          S.findings[id]={status:'not_analyzed',not_analyzed_reason:friendlyReason({message:firstErr}),not_analyzed_function:fnId};
        });
      }else{
        // Whole-function rejection: every sub gets the failure reason.
        console.warn('Findings error:',fnId,res.reason);
        const reason=friendlyReason(res.reason);
        inScopeForFn.forEach(id=>{
          if(S.findings[id])return;
          S.findings[id]={status:'not_analyzed',not_analyzed_reason:reason,not_analyzed_function:fnId};
        });
      }
    });
    if(ok===0)throw new Error('No findings were returned. Check your API key, model, and network; open the browser console (F12) for details.');

    // ── Phase 2: critic quality-check (parallel, non-fatal) ──
    setLoading(`Step 2/3 — Running critic quality check…`,`Verifying score consistency against evidence quality. Non-fatal — partial failures are OK.`);
    await Promise.allSettled(fns.map(fn=>runCriticPassForFunction(fn).catch(e=>console.warn('[Critic]',fn.id,e.message))));

    // ── Phase 3: executive narratives (parallel, non-fatal) ──
    setLoading(`Step 3/3 — Writing executive narratives…`,`Generating one board-level paragraph per function.`);
    const fnScoresForNarr={};
    const _excl3=new Set(S.excludedSubcategories||[]);fns.forEach(fn=>{const vals=(SC_BY_FN[fn.id]||[]).filter(id=>!_excl3.has(id)).map(id=>S.findings[id]?.cmmi_score).filter(x=>x!=null);fnScoresForNarr[fn.id]=avg(vals);});
    await Promise.allSettled(fns.map(fn=>generateNarrativeForFunction(fn,fnScoresForNarr[fn.id])));

    S.activeReviewFn=S.includedFns[0]||'GV';S.step='findings_review';saveState();
  }catch(e){
    clearLoading();render();
    await uiAlert('Error generating findings: '+e.message);
  }finally{clearLoading();render();}
}

async function reanalyzeFinding(scId){
  const f=S.findings[scId];const sc=SC_MAP[scId];
  if(!(f.dispute_note||'').trim()){await uiAlert('Please describe your dispute or provide additional context first.');return;}
  setLoading(`Re-analyzing ${scId}...`);
  try{
    const sys=`You are a NIST CSF 2.0 assessor revising a finding based on new organizational context. Write in business risk terms. Return ONLY valid JSON.`;
    const msg=`Subcategory: ${scId}\nText: ${sc.text}\nOrg: ${S.org.name} | Industry: ${S.org.industry}\n\nOriginal finding:\nCurrent state: ${f.current_state}\nBusiness risk: ${f.business_risk||'not recorded'}\nRationale: ${f.rationale}\nCMMI: ${f.cmmi_score} | Tier: ${f.tier_score}\n\nOrganization's dispute/additional context:\n${f.dispute_note}\n\nRevise the finding in light of this context. Update score and rationale if the context materially changes the assessment; if not, acknowledge the org's position in dispute_resolution but maintain the original score with explanation.\n\nReturn JSON:\n{"current_state":"...","gaps":"specific gap or null","business_risk":"one sentence on business/operational risk","cmmi_score":2,"tier_score":2,"rationale":"...","recommendation":"specific actionable step","priority":"high|medium|low","dispute_resolution":"how the dispute was considered and resolved"}`;
    const raw=await callAI(sys,msg,true,{outputTokens:8192,jsonMime:providerSupportsJsonMime()});
    const parsed=parseJSON(raw);
    S.findings[scId]={...f,...parsed,status:'approved',dispute_note:f.dispute_note};saveState();
  }catch(e){
    clearLoading();render();
    await uiAlert('Re-analysis error: '+e.message);
  }finally{clearLoading();render();}
}

async function processFiles(catId,reqId,files){
  setLoading('Reading files...');
  const entry=getDrlEntry(catId,reqId);
  entry.notProvided=false;
  entry.notProvidedReason='';
  for(const file of files){
    try{
      const content=await extractText(file);
      entry.files.push({name:file.name,content,size:file.size,context:''});
    }
    catch(e){console.warn('File error:',file.name,e);}
  }
  clearLoading();saveState();render();
}
function handleFileInput(e,catId,reqId){processFiles(catId,reqId,Array.from(e.target.files));}
function handleDrop(e,catId,reqId){e.preventDefault();document.querySelector(`[data-dropzone][data-cat="${catId}"][data-req="${reqId}"]`)?.classList.remove('drag-over');processFiles(catId,reqId,Array.from(e.dataTransfer.files));}

async function analyzeScopeWithAI(){
  setLoading('Analyzing scope with AI…','Reviewing your organization profile and recommending which CSF subcategories are most relevant. Usually takes 30–60 seconds.');
  try{
    const sys=`You are a NIST CSF 2.0 scoping expert. Given an organization's profile, you classify every CSF 2.0 subcategory as: "include" (essential for this org), "optional" (situational benefit), or "exclude" (low priority / not applicable). Be practical — small or mid-size orgs should have fewer "include" items than large enterprises.`;
    const allScs=SC_RAW.map(([id,text])=>`${id}: ${text}`).join('\n');
    const msg=`Organization Profile:
- Industry: ${S.org.industry}
- Total headcount: ${S.org.orgSize||'Unknown'}
- IT org size: ${S.org.itOrgSize||'Unknown'}
- Cybersecurity team: ${S.org.cyberOrgSize||'Unknown'}
- Assessment scope: ${S.org.scope||'Enterprise-wide'}

CSF 2.0 Subcategories (${SC_RAW.length} total):
${allScs}

Classify each subcategory. Return ONLY a JSON object (no markdown, no extra text):
{
  "GV.OC-01": {"action":"include","reason":"Core governance — applies to all orgs"},
  "GV.OC-02": {"action":"optional","reason":"Useful for regulated sectors; situational otherwise"},
  "PR.AA-05": {"action":"exclude","reason":"PKI/certificate mgmt — low priority for small org without complex infra"},
  ...
}
Every subcategory ID must appear exactly once. Use only: "include", "optional", or "exclude" for action.`;
    const raw=await callAI(sys,msg,true,{outputTokens:16384,jsonMime:providerSupportsJsonMime()});
    const parsed=parseJSON(raw);
    if(parsed&&typeof parsed==='object'){
      S.aiScopeRec=parsed;
      // Pre-exclude anything the AI flagged as exclude
      S.excludedSubcategories=SC_RAW.map(([id])=>id).filter(id=>(parsed[id]?.action||'include')==='exclude');
      S.includedFns=FUNCTIONS.map(f=>f.id); // all fns — scope page lets user refine
    }
    S.step='scope';saveState();
  }catch(e){
    clearLoading();
    // Graceful fallback: go to scope page without AI recs
    await uiAlert('Scope analysis failed: '+e.message+'\n\nContinuing without AI recommendations — all subcategories included by default.');
    S.aiScopeRec={};
    S.excludedSubcategories=[];
    S.includedFns=FUNCTIONS.map(f=>f.id);
    S.step='scope';saveState();render();
    return;
  }finally{clearLoading();render();}
}

function updateScopePageCounts(){
  const excl=new Set(S.excludedSubcategories||[]);
  const inScope=SC_RAW.filter(([id])=>!excl.has(id)).length;
  const inEl=document.getElementById('scope-in-count');
  const outEl=document.getElementById('scope-out-count');
  if(inEl)inEl.textContent=inScope;
  if(outEl)outEl.textContent=SC_RAW.length-inScope;
  // Update per-function counts and checkboxes
  FUNCTIONS.forEach(fn=>{
    const fnScs=SC_BY_FN[fn.id]||[];
    const fnIn=fnScs.filter(id=>!excl.has(id)).length;
    const fnEl=document.querySelector(`[data-scope-fn-count="${fn.id}"]`);
    if(fnEl)fnEl.textContent=`${fnIn}/${fnScs.length} subcategories`;
    const fnCb=document.querySelector(`input[data-action="toggle-fn"][data-fnid="${fn.id}"]`);
    if(fnCb){
      fnCb.checked=fnIn>0;
      fnCb.indeterminate=fnIn>0&&fnIn<fnScs.length;
    }
    // Per-category
    (CATEGORIES[fn.id]||[]).forEach(catId=>{
      const catScs=SC_BY_CAT[catId]||[];
      const catIn=catScs.filter(id=>!excl.has(id)).length;
      const catEl=document.querySelector(`[data-scope-cat-count="${catId}"]`);
      if(catEl)catEl.textContent=`${catIn}/${catScs.length}`;
      const catCb=document.querySelector(`input[data-action="toggle-cat"][data-catid="${catId}"]`);
      if(catCb){
        catCb.checked=catIn>0;
        catCb.indeterminate=catIn>0&&catIn<catScs.length;
      }
    });
  });
}

      if(!S.apiKey){await uiAlert('Please enter your Anthropic API key.');return;}

      if(S.provider!=='anthropic'&&S.provider!=='gemini')S.provider='gemini';
      if(S.provider==='gemini'&&(!S.model||!/^gemini-/.test(S.model)))S.model='gemini-2.5-flash';
      if(S.provider==='anthropic'&&(!S.model||!/^claude-/.test(S.model)))S.model='claude-haiku-4-5-20251001';
    }else if(t==='byo'){
      S.provider='anthropic';
      if(!S.model||!/^claude-/.test(S.model))S.model='claude-sonnet-4-6';
    }
    saveState();render();
  }
  else if(action==='set-provider'){
    const p=el.dataset.provider==='gemini'?'gemini':'anthropic';
    if(p===S.provider)return;
    S.provider=p;
    if(p==='gemini'){
      if(!S.model||!/^gemini-/.test(S.model))S.model='gemini-2.5-flash';
      S.assessmentMode='sample';

  }

    if(box){const shown=box.style.display==='none';box.style.display=shown?'block':'none';el.textContent=shown?'Hide':'How do I get this?';}
  }
  else if(action==='welcome-reset'){
    if(!await uiConfirm('Clear all saved assessment data and start fresh?\n\nThis cannot be undone.',{danger:true,okText:'Clear & start fresh'}))return;
    localStorage.removeItem('csf_state');
    S=Object.assign(S,{step:'welcome',assessmentMode:'full',selectedTier:'byo',org:{name:'',industry:'',scope:'',date:'',assessorName:'',email:'',emailVerified:false,verificationCode:'',verificationSent:false,orgSize:'',itOrgSize:'',cyberOrgSize:'',dataConsentAcknowledged:false},scoringMethod:'both',includedFns:['GV','ID','PR','DE','RS','RC'],excludedSubcategories:[],aiScopeRec:{},benchmarkSent:false,drlViewFns:null,drl:{},drlValidationErrors:[],evidenceMap:{},docSummaries:[],questionnaire:null,answers:{},activeRole:0,findings:{},functionNarratives:{},activeReviewFn:'GV',reportPage:0,targetFnScores:{},execSummary:'',topGapsAnalysis:null,consultationLead:{shown:false,path:'',topic:'',duration:'',name:'',company:'',email:'',phone:'',preferredContact:'',notes:'',sent:false}});
    render();
  }
  else if(action==='welcome-resume'){
    loadState();
    if(S.provider==='gemini'){
      const k=document.getElementById('inp-gemini-key');
      if(k?.value.trim())S.geminiApiKey=k.value.trim();
      if(!S.geminiApiKey){await uiAlert('Please enter your Gemini API key.');return;}

      if(k?.value.trim())S.apiKey=k.value.trim();
      if(!S.apiKey){await uiAlert('Please enter your API key.');return;}

    S.excludedSubcategories=[...excl];

    if(set.has(fid)){
      if(set.size<=1)return;
      set.delete(fid);
    }else set.add(fid);

    sb.classList.toggle('collapsed');
    const open=!sb.classList.contains('collapsed');

  }
  else if(action==='drl-jump-sc-cat'){

      setTimeout(()=>{
        if(scrollEl){
          const y=target.getBoundingClientRect().top-scrollEl.getBoundingClientRect().top+scrollEl.scrollTop;
          scrollEl.scrollTo({top:Math.max(0,y-10),behavior:'smooth'});
        }else{target.scrollIntoView({behavior:'smooth',block:'nearest'});}
        target.classList.remove('drl-sc-flash');
        void target.offsetWidth;
        target.classList.add('drl-sc-flash');
        setTimeout(()=>target.classList.remove('drl-sc-flash'),1200);
      },70);
