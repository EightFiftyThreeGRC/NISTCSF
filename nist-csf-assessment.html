.drl-sc-cat-head{font-size:.7rem;color:#1e88e5;margin:0 0 6px 0;font-weight:700;line-height:1.3}
.drl-sc-sublist{list-style:none;padding:0;margin:0}

.drl-sc-subitem:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}

.drl-sc-main{flex:1;min-width:0}
.drl-fn-filter-card{padding:18px 24px!important;margin-bottom:16px}

.drl-drop-zone{min-height:44px;display:flex;align-items:center;justify-content:center;padding:10px 6px!important;font-size:.72rem!important}
.np-box textarea{width:100%;min-height:72px;margin-top:0}
.drl-master .req-context textarea{min-height:52px;font-size:.76rem;padding:8px}
.drop-zone{border:2px dashed #b0c8e0;border-radius:8px;padding:16px;text-align:center;font-size:.8rem;color:#5a7a96;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:#1e88e5;background:#f0f7ff}
.file-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.file-item{display:flex;align-items:center;justify-content:space-between;gap:6px;background:#f0f4f8;border-radius:6px;padding:5px 8px;font-size:.74rem;min-width:0}
.file-item>span:first-child{min-width:0;overflow-wrap:anywhere;flex:1}
.file-item .rm{cursor:pointer;color:#e53935;font-weight:700;margin-left:0;flex-shrink:0}
.drl-master .req-title{font-size:.76rem;line-height:1.3}
.drl-master .req-hint{font-size:.7rem}
.q-card{background:#fff;border:1.5px solid #d0dce8;border-radius:10px;padding:20px;margin-bottom:14px}
.q-text{font-size:.92rem;font-weight:600;margin-bottom:4px;color:#1a2332}
.q-guide{font-size:.75rem;color:#7a9ab8;margin-bottom:12px;font-style:italic}
.q-scs{font-size:.7rem;color:#1e88e5;margin-bottom:10px}
.likert-row{display:flex;gap:6px;flex-wrap:wrap}
.likert-btn{flex:1;min-width:80px;padding:8px 4px;border:1.5px solid #d0dce8;border-radius:8px;background:#fff;cursor:pointer;font-size:.75rem;text-align:center;transition:.15s}
.likert-btn:hover{border-color:#1e88e5;background:#f0f7ff}
.likert-btn.selected{border-color:#1e88e5;background:#1e88e5;color:#fff}
.yn-row{display:flex;gap:8px}
.yn-btn{flex:1;padding:9px;border:1.5px solid #d0dce8;border-radius:8px;background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;text-align:center;transition:.15s}

.yn-btn.selected{border-color:#1e88e5;background:#1e88e5;color:#fff}
.role-tabs{display:flex;gap:0;border-bottom:2px solid #e0eaf4;margin-bottom:24px;overflow-x:auto}

.role-tab.active{color:#1e88e5;border-bottom-color:#1e88e5}
.finding-card{border:1.5px solid #d0dce8;border-radius:10px;padding:20px;margin-bottom:12px;transition:.2s}

.finding-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}

.finding-text{font-size:.85rem;color:#1a2332;font-weight:600;flex:1}
.finding-scores{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.score-badge{padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;white-space:nowrap}
.finding-body{font-size:.83rem;color:#2c4a6a;line-height:1.55}

.finding-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.dispute-box{background:#fff8f0;border:1.5px solid #ffa726;border-radius:8px;padding:14px;margin-top:12px}

  .top-bar .badge,.progress-bar,.btn,.step-pill,.finding-actions,.dispute-box{display:none!important}

}

function scoreColor(s){
  if(!s||s<1)return{bg:'#f0f4f8',fg:'#5a7a96'};
  if(s<2)    return{bg:'#ffebee',fg:'#c62828'};
  if(s<3)    return{bg:'#fff3e0',fg:'#e65100'};
  if(s<3.5)  return{bg:'#fffde7',fg:'#f57f17'};
  if(s<4.5)  return{bg:'#f1f8e9',fg:'#2e7d32'};
  return          {bg:'#e8f5e9',fg:'#1b5e20'};
}
function scoreChip(v,label=''){const c=scoreColor(v);return`<span class="score-badge" style="background:${c.bg};color:${c.fg}">${label}${v!=null?v:'-'}</span>`;}
function tierFromCmmi(c){if(!c||c<1)return'-';if(c<2)return'Tier 1';if(c<2.5)return'Tier 1–2';if(c<4)return'Tier 3';if(c<4.5)return'Tier 3–4';return'Tier 4';}
function avg(arr){const v=arr.filter(x=>x!=null&&x>0);if(!v.length)return null;return Math.round((v.reduce((a,b)=>a+b,0)/v.length)*10)/10;}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseJSON(str){
  let s=String(str||'').trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  const i=s.indexOf('{');
  const j=s.lastIndexOf('}');
  if(i===-1||j===-1||j<i)throw new Error('No JSON object found in model response.');
  s=s.slice(i,j+1);
  try{return JSON.parse(s);}
  catch(e){throw new Error(((e&&e.message)||'Invalid JSON')+' — model output may be truncated or contain unescaped characters.');}
}
function getDrlEntry(catId,reqId){
  if(!S.drl[catId])S.drl[catId]={};
  if(!S.drl[catId][reqId])S.drl[catId][reqId]={files:[],notProvided:false,notProvidedReason:''};
  return S.drl[catId][reqId];
}
function allRequests(){return DRL_CATS.flatMap(cat=>cat.requests.map(r=>({catId:cat.id,catName:cat.name,...r})));} 
function drlStats(useViewFilter){
  const reqs=useViewFilter?allRequestsForView():allRequests();
  let addressed=0,totalFiles=0;
  reqs.forEach(r=>{
    const e=getDrlEntry(r.catId,r.id);
    totalFiles+=e.files.length;
    const hasReason=e.notProvided&&(e.notProvidedReason||'').trim().length>=10;
    const filesComplete=e.files.length>0&&e.files.every(f=>(f.context||'').trim().length>=5);
    if(hasReason||filesComplete)addressed++;
  });
  return{addressed,total:reqs.length,totalFiles};
}
function validateDRL(){
  const errs=[];
  allRequestsForView().forEach(r=>{
    const e=getDrlEntry(r.catId,r.id);
    if(e.notProvided){
      if((e.notProvidedReason||'').trim().length<10)errs.push(`${r.title}: provide a not-provided reason (10+ chars).`);
      return;
    }
    if(!e.files.length){errs.push(`${r.title}: upload at least one file or mark as not provided.`);return;}
    e.files.forEach((f,idx)=>{if((f.context||'').trim().length<5)errs.push(`${r.title} (file ${idx+1}: ${f.name}) needs context (5+ chars).`);});
  });
  return errs;
}

// ════════════════════════════════════════════════════════════
// AI API — routes to Gemini or Anthropic based on provider
// ════════════════════════════════════════════════════════════
/** Google often retires bare gemini-1.5-pro on v1beta; map to a model that supports generateContent. */
function normalizeGeminiModelId(model){
  const m=String(model||'gemini-2.0-flash').trim();
  if(m==='gemini-1.5-pro'||m==='gemini-1.5-pro-latest'||m==='gemini-1.5-pro-001'||m==='gemini-1.5-pro-002')return'gemini-2.0-flash';
  return m;
}
/** @param callOpts {{outputTokens?:number,jsonMime?:boolean}} Gemini/OpenAI: JSON mode when jsonMime; Anthropic: max_tokens only */
function providerSupportsJsonMime(){return S.provider==='gemini'||S.provider==='openai';}
async function callAI(system, userMsg, qualityCall=false, callOpts={}){
  const outTok=callOpts.outputTokens!=null?callOpts.outputTokens:(qualityCall?8192:4096);
  if(S.provider==='gemini'){
    return callGemini(system,userMsg,normalizeGeminiModelId(S.model),{
      maxOutputTokens:outTok,
      jsonMime:!!callOpts.jsonMime,
    });
  }
  if(S.provider==='openai'){
    const maxTok=Math.max(outTok,qualityCall?8192:4096);
    return callOpenAI(system,userMsg,S.model||'gpt-4o-mini',{maxTokens:maxTok,jsonObject:!!callOpts.jsonMime});
  }
  const model=qualityCall?'claude-sonnet-4-6':S.model;
  const maxTok=Math.max(outTok,qualityCall?8192:4096);
  return callAnthropic(system,userMsg,model,{maxTokens:maxTok});
}

async function callGemini(system, userMsg, model='gemini-2.0-flash', opts={}){
  model=normalizeGeminiModelId(model);
  const maxOutputTokens=opts.maxOutputTokens!=null?opts.maxOutputTokens:4096;
  const generationConfig={maxOutputTokens,temperature:0.2};
  if(opts.jsonMime)generationConfig.responseMimeType='application/json';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${S.apiKey}`;
  const resp=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      systemInstruction:{parts:[{text:system}]},
      contents:[{parts:[{text:userMsg}]}],
      generationConfig,
    }),
  });
  if(!resp.ok){const e=await resp.text();throw new Error(`Gemini error ${resp.status}: ${e}`);}
  const d=await resp.json();
  const c=d.candidates&&d.candidates[0];
  if(!c)throw new Error('Gemini returned no candidates (content may be blocked). '+(d.promptFeedback?JSON.stringify(d.promptFeedback):''));
  const reason=c.finishReason;
  if(reason==='MAX_TOKENS')throw new Error('Gemini hit the output token limit (truncated JSON). Use a shorter questionnaire scope or try again.');
  if(reason==='OTHER')throw new Error('Gemini stopped with an incomplete response (finishReason OTHER). Try again or narrow the assessment scope.');
  if(reason&&reason!=='STOP')console.warn('Gemini finishReason:',reason);
  const parts=c.content&&c.content.parts;
  if(!parts||!parts.length)throw new Error('Gemini response had no content parts.');
  const t=parts.map(p=>p.text||'').join('');
  if(!t.trim())throw new Error('Gemini returned empty text.');
  return t;
}

async function callAnthropic(system, userMsg, model, opts={}){
  model=model||S.model;
  const max_tokens=opts.maxTokens!=null?opts.maxTokens:4096;
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,max_tokens,system,messages:[{role:'user',content:userMsg}]}),
  });
  if(!resp.ok){const e=await resp.text();throw new Error(`Anthropic error ${resp.status}: ${e}`);}
  const d=await resp.json();
  return d.content[0].text;
}

async function callOpenAI(system,userMsg,model,opts={}){
  const max_tokens=opts.maxTokens!=null?opts.maxTokens:4096;
  const body={
    model:model||'gpt-4o-mini',
    messages:[{role:'system',content:system},{role:'user',content:userMsg}],
    max_tokens,
    temperature:0.2,
  };
  if(opts.jsonObject)body.response_format={type:'json_object'};
  const resp=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},
    body:JSON.stringify(body),
  });
  if(!resp.ok){const e=await resp.text();throw new Error(`OpenAI error ${resp.status}: ${e}`);}
  const d=await resp.json();
  const msg=d.choices&&d.choices[0]&&d.choices[0].message;
  const t=(msg&&msg.content)||'';
  if(!String(t).trim())throw new Error('OpenAI returned empty content.');
  return t;
}

// FILE EXTRACTION
// ════════════════════════════════════════════════════════════
async function extractText(file){
  const n=file.name.toLowerCase();
  if(n.endsWith('.pdf'))return extractPDF(file);
  if(n.endsWith('.docx'))return extractDOCX(file);
  return file.text();
}
async function extractPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let t='';
  for(let i=1;i<=Math.min(pdf.numPages,30);i++){
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    t+=tc.items.map(x=>x.str).join(' ')+'\n';
  }
  return t.slice(0,12000);
}
async function extractDOCX(file){
  const buf=await file.arrayBuffer();
  const r=await mammoth.extractRawText({arrayBuffer:buf});
  return r.value.slice(0,12000);
}

function demoAnswerHash(seed){
  let h=0;
  const s=String(seed||'');
  for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;
  return h>>>0;
}
function applyDemoQuestionnaireAnswers(){
  const q=S.questionnaire;
  if(!q||!q.roles||!q.roles.length){alert('No questionnaire loaded.');return;}
  const totalA=q.roles.reduce((a,r)=>a+r.questions.filter(qu=>S.answers[qu.id]!=null&&S.answers[qu.id]!=='').length,0);
  if(totalA>0&&!confirm(`Replace ${totalA} existing answer(s) with synthetic demo answers?`))return;
  const openings=[
    '[Demo] In our environment, ',
    '[Demo walkthrough] Staff report that ',
    '[Demo] For this topic, ',
    '[Demo] Process-wise, ',
    '[Demo] Evidence suggests ',
    '[Demo] Practically, ',
    '[Demo] For testing: ',
    '[Demo] Interview-style note: ',
  ];
  const middles=[
    'we review this on a quarterly cadence with named owners.',
    'exceptions are uncommon and tracked in a ticketing system.',
    'policy exists and is enforced first on higher-risk systems.',
    'metrics are still maturing but sponsorship is visible.',
    'critical vendors are assessed at least annually.',
    'logging coverage expanded after the last assessment cycle.',
    'the steering group escalates gaps to leadership within a few weeks.',
    'a tabletop exercise partially validated the workflow.',
    'ownership is split between security and IT with clear RACI.',
    'budget was approved for remediation items tied to this area.',
    'we use a risk register entry and revisit it at each QBR.',
    'training is role-based; completion is monitored in the LMS.',
  ];
  const closings=[
    'No production customer data was used in this demo answer.',
    'Numbers here are illustrative for UI testing only.',
    'Further detail would come from policy attachments and tickets.',
    'This line is unique to this question id for downstream AI testing.',
  ];
  let n=0;
  q.roles.forEach((r,ri)=>{
    r.questions.forEach((qu,qi)=>{
      const seed=`${qu.id}|${ri}|${qi}|${r.role||''}|${(qu.text||'').slice(0,80)}`;
      const h=demoAnswerHash(seed+n);
      const t=(qu.type||'freetext').toLowerCase();
      if(t==='likert5')S.answers[qu.id]=String((h%5)+1);
      else if(t==='likert3')S.answers[qu.id]=String((h%3)+1);
      else if(t==='yesno'){const yn=['yes','no','partial','na'];S.answers[qu.id]=yn[h%4];}
      else if(t==='multichoice'&&qu.options&&qu.options.length)S.answers[qu.id]=qu.options[h%qu.options.length];
      else{
        const qtext=(qu.text||'').replace(/\s+/g,' ').trim().slice(0,100);
        const sc=(qu.subcategories&&qu.subcategories.length)?` Maps to: ${qu.subcategories.slice(0,4).join(', ')}.`:'';
        S.answers[qu.id]=
          openings[n%openings.length]+
          middles[(h+ri+qi)%middles.length]+
          ` Question ${qu.id} (${(r.role||'Role').slice(0,32)}): ${qtext}.${sc}`+
          closings[h%closings.length];
      }
      n++;
    });
  });
  saveState();render();
}

function renderQuestion(qu,qi){
  const val=S.answers[qu.id];
  const l5=['1 — Never / Not at all','2 — Rarely / Minimal','3 — Sometimes / Partial','4 — Usually / Mostly','5 — Always / Fully'];
  const l3=['Ad hoc / Informal','Partially defined','Fully defined & consistent'];
  let inp='';
  if(qu.type==='likert5'){inp=`<div class="likert-row">${l5.map((l,i)=>`<button class="likert-btn ${val==(i+1)?'selected':''}" data-action="answer-q" data-qid="${qu.id}" data-val="${i+1}">${l}</button>`).join('')}</div>`;}
  else if(qu.type==='likert3'){inp=`<div class="likert-row">${l3.map((l,i)=>`<button class="likert-btn ${val==(i+1)?'selected':''}" data-action="answer-q" data-qid="${qu.id}" data-val="${i+1}">${l}</button>`).join('')}</div>`;}
  else if(qu.type==='yesno'){inp=`<div class="yn-row"><button class="yn-btn ${val==='yes'?'selected':''}" data-action="answer-q" data-qid="${qu.id}" data-val="yes">Yes</button><button class="yn-btn ${val==='no'?'selected':''}" data-action="answer-q" data-qid="${qu.id}" data-val="no">No</button><button class="yn-btn ${val==='partial'?'selected':''}" data-action="answer-q" data-qid="${qu.id}" data-val="partial">Partially</button><button class="yn-btn ${val==='na'?'selected':''}" data-action="answer-q" data-qid="${qu.id}" data-val="na">N/A</button></div>`;}
  else if(qu.type==='multichoice'&&qu.options){inp=`<div class="likert-row">${qu.options.map(o=>`<button class="likert-btn ${val===o?'selected':''}" data-action="answer-q" data-qid="${qu.id}" data-val="${escHtml(o)}">${escHtml(o)}</button>`).join('')}</div>`;}
  else{inp=`<textarea rows="3" placeholder="Describe your current practice..." data-action="answer-text" data-qid="${qu.id}">${escHtml(val||'')}</textarea>`;}
  return`<div class="q-card"><div style="font-size:.72rem;font-weight:700;color:#7a9ab8;margin-bottom:4px">Q${qi+1}</div><div class="q-text">${escHtml(qu.text)}</div>${qu.guidance?`<div class="q-guide">Why we ask: ${escHtml(qu.guidance)}</div>`:''}${qu.subcategories?`<div class="q-scs">📎 ${qu.subcategories.join(', ')}</div>`:''}${inp}</div>`;
}

function renderRadar(fns,fnScores){
  const cx=180,cy=180,r=130,n=fns.length,max=5;
  let rings='',axes='',labels='',poly='';
  [1,2,3,4,5].forEach(l=>{const pts=fns.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,d=r*(l/max);return`${cx+Math.cos(a)*d},${cy+Math.sin(a)*d}`;}).join(' ');rings+=`<polygon points="${pts}" fill="none" stroke="#e0eaf4" stroke-width="1"/>`;});
  fns.forEach((fn,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;axes+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*r}" y2="${cy+Math.sin(a)*r}" stroke="#e0eaf4" stroke-width="1"/>`;labels+=`<text x="${cx+Math.cos(a)*r*1.15}" y="${cy+Math.sin(a)*r*1.15+5}" text-anchor="middle" font-size="11" font-weight="700" fill="${fn.color}">${fn.id}</text>`;});
  const pts=fns.map((fn,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(fnScores[fn.id]||0)/max;return`${cx+Math.cos(a)*r*v},${cy+Math.sin(a)*r*v}`;}).join(' ');
  poly=`<polygon points="${pts}" fill="rgba(30,136,229,.15)" stroke="#1e88e5" stroke-width="2"/>`;
  fns.forEach((fn,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(fnScores[fn.id]||0)/max;poly+=`<circle cx="${cx+Math.cos(a)*r*v}" cy="${cy+Math.sin(a)*r*v}" r="4" fill="${fn.color}"/>`;});
  return`<svg viewBox="0 0 360 360" style="width:100%;max-width:320px;display:block;margin:0 auto">${rings}${axes}${poly}${labels}</svg>`;
}

  ensureDrlViewFns();

    }];
    const cat=DRL_CATS.find(c=>c.id===r.catId);
    const candidates=cat?scIdsTouchingDrlCategory(cat):[];
    const pick=candidates.length?candidates.slice(0,Math.min(5,candidates.length)):SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])).map(x=>x[0]).slice(0,3);
    const mapping={};
    pick.forEach((scId,j)=>{
      const q=qualities[(idx+j)%4];
      mapping[scId]={evidence_quality:q,excerpt:`Demo line for ${scId} from ${r.title}.`,notes:'Synthetic demo mapping'};
    });
    Object.entries(mapping).forEach(([scId,ev])=>{
      if(!S.evidenceMap[scId])S.evidenceMap[scId]={quality:'missing',excerpts:[]};
      if((rank[ev.evidence_quality]||0)>(rank[S.evidenceMap[scId].quality]||0))S.evidenceMap[scId].quality=ev.evidence_quality;
      S.evidenceMap[scId].excerpts.push(`[${fname}] ${ev.excerpt}`);
    });

      catId:r.catId,requestId:r.id,name:fname,

      mappings:mapping
    });

  SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])).forEach(([id],i)=>{

async function analyzeDocuments(){
  const errs=validateDRL();
  S.drlValidationErrors=errs;
  if(errs.length){saveState();render();alert(`Please address ${errs.length} evidence request issue(s) before analysis.`);return;}
  if(S.demoEvidence&&!confirm('Replace demo evidence with a real AI read of your uploaded files? Your current demo evidence map and summaries will be cleared.'))return;
  S.demoEvidence=false;
  setLoading('Analyzing documents with AI...');
  S.evidenceMap={};S.docSummaries=[];
  try{
    const scList=SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])).map(([id,text])=>`${id}: ${text}`).join('\n');
    ensureDrlViewFns();
    for(const cat of drlCatsForTable()){
      for(const req of cat.requests){
        const entry=getDrlEntry(cat.id,req.id);
        if(entry.notProvided){
          S.docSummaries.push({catId:cat.id,requestId:req.id,name:req.title,summary:`Not provided: ${entry.notProvidedReason}`,mappings:{}});
          continue;
        }
        for(const file of(entry.files||[])){
        setLoading(`Analyzing: ${file.name}...`);
        const sys=`You are a NIST CSF 2.0 expert assessor. Analyze the document excerpt and identify which CSF 2.0 subcategories it provides evidence for. Return ONLY valid JSON, no markdown.`;
        const msg=`Document category: ${cat.name}\nRequested artifact: ${req.title}\nDocument: ${file.name}\nUploader context: ${file.context||'None provided'}\n\nContent:\n${file.content.slice(0,6000)}\n\nSubcategories:\n${scList}\n\nReturn JSON:\n{"document_type":"policy|procedure|risk_register|asset_inventory|training|architecture|contract|audit|other","document_summary":"one sentence","mappings":{"SC_ID":{"evidence_quality":"strong|adequate|weak","excerpt":"relevant text max 150 chars","notes":"why this supports the subcategory"}}}`;
        try{
          const raw=await callAI(sys,msg,false);
          const p=parseJSON(raw);
          S.docSummaries.push({catId:cat.id,requestId:req.id,name:file.name,summary:p.document_summary,mappings:p.mappings||{}});
          const rank={strong:3,adequate:2,weak:1,missing:0};
          Object.entries(p.mappings||{}).forEach(([scId,ev])=>{
            if(!S.evidenceMap[scId])S.evidenceMap[scId]={quality:'missing',excerpts:[]};
            if((rank[ev.evidence_quality]||0)>(rank[S.evidenceMap[scId].quality]||0))S.evidenceMap[scId].quality=ev.evidence_quality;
            if(ev.excerpt)S.evidenceMap[scId].excerpts.push(`[${file.name}] ${ev.excerpt}`);
          });
        }catch(e){console.warn('Doc error:',file.name,e);}
      }
      }
    }
    SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])).forEach(([id])=>{if(!S.evidenceMap[id])S.evidenceMap[id]={quality:'missing',excerpts:[]};});
    S.drlValidationErrors=[];
    S.step='analysis';saveState();
  }finally{clearLoading();render();}
}

async function generateQuestionnaire(){
  setLoading('Generating targeted questionnaire…','This step often takes a few minutes (roughly 2 to 5 is typical; it can reach about 10 with a large scope, a slower model, or busy APIs). Leave this tab open until the questionnaire appears.');
  try{
    const GAP_CAP=12000;
    const CONF_CAP=6000;
    let gaps=SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])&&['missing','weak'].includes(S.evidenceMap[id]?.quality)).map(([id,text])=>`${id}: ${text}`).join('\n');
    if(gaps.length>GAP_CAP)gaps=gaps.slice(0,GAP_CAP)+'\n\n(... gap list truncated for length; prioritize the highest-risk gaps implied above.)';
    let confirmed=SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])&&['strong','adequate'].includes(S.evidenceMap[id]?.quality)).map(([id])=>id).join(', ');
    if(confirmed.length>CONF_CAP)confirmed=confirmed.slice(0,CONF_CAP)+' ...';
    const sys=`You are a NIST CSF 2.0 assessment expert. Output a single JSON object only (no markdown, no commentary). Each question text under 200 characters; guidance one short sentence only.`;
    const msg=`Organization: ${S.org.name} | Industry: ${S.org.industry}\nScope: ${S.org.scope}\n\nEvidence GAPS (focus questions here):\n${gaps}\n\nAlready confirmed via documents: ${confirmed}\n\nGenerate a questionnaire with 18-28 questions total. Rules:\n- Group by role (CISO/Security Lead, IT Lead, Risk Manager, HR Lead, Business Continuity Lead)\n- Questions reveal paper vs practice gaps; scenario-based where possible\n- Each question maps to specific subcategory IDs; do not ask what documents already confirm\n- Keep options arrays short (max 6 options for multichoice)\n\nReturn this JSON shape:\n{"roles":[{"role":"CISO / Security Lead","description":"short","questions":[{"id":"Q1","text":"max ~200 chars","type":"likert5|likert3|yesno|multichoice|freetext","options":["opt1"],"subcategories":["GV.OC-01"],"guidance":"one sentence"}]}]}`;
    const raw=await callAI(sys,msg,true,{outputTokens:16384,jsonMime:providerSupportsJsonMime()});
    S.questionnaire=parseJSON(raw);S.activeRole=0;S.step='questionnaire';saveState();
  }catch(e){
    clearLoading();render();
    alert('Error generating questionnaire: '+e.message);
  }finally{clearLoading();render();}
}

async function fetchFindingsForFunction(fn,answerSummary){
  const scs=SC_BY_FN[fn.id]||[];
  if(!scs.length)return{};
  const scDetails=scs.map(id=>{
    const sc=SC_MAP[id];const ev=S.evidenceMap[id];
    return`${id}: ${sc.text}\nEvidence: ${ev?.quality||'missing'}${(ev?.excerpts||[]).length?'\nExcerpts: '+(ev.excerpts||[]).slice(0,2).join(' | '):''}`;
  }).join('\n\n');
  const sys=`You are a NIST CSF 2.0 assessor generating assessment findings. Be specific and evidence-based. Return ONLY valid JSON.`;
  const msg=`Org: ${S.org.name} | Industry: ${S.org.industry} | Scoring: ${S.scoringMethod}\n\nFUNCTION: ${fn.id} — ${fn.name}\n\nSubcategory evidence:\n${scDetails}\n\nQuestionnaire responses:\n${answerSummary.slice(0,3000)}\n\nGenerate findings for ALL subcategories in ${fn.id}. Return JSON:\n{"${scs[0]}":{"current_state":"2-3 sentences","gaps":"specific gaps or null","cmmi_score":2,"tier_score":2,"rationale":"2-3 sentences tying score to evidence","recommendation":"specific actionable improvement","priority":"high|medium|low"}}\n\nCMMI: 1=Initial/ad hoc, 2=Managed/project-level, 3=Defined/org-wide, 4=Quantitative, 5=Optimizing\nTier: 1=Partial, 2=Risk Informed, 3=Repeatable, 4=Adaptive`;
  const raw=await callAI(sys,msg,true,{outputTokens:8192,jsonMime:providerSupportsJsonMime()});
  return parseJSON(raw);
}

function applyDemoFindingsSkipAi(){
  const prios=['high','medium','low'];
  const inScope=SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0]));
  S.findings={};
  S.demoFindings=true;
  inScope.forEach(([id,text],i)=>{
    const ev=S.evidenceMap[id];
    const q=ev?.quality||'missing';
    const base=2+(i%4);
    const tier=Math.min(4,Math.max(1,(i%4)+1));
    S.findings[id]={
      current_state:`[Demo] Illustrative current-state narrative for ${id}. Evidence in this session is rated "${q}" (synthetic / local only).`,
      gaps:i%7===0?'[Demo] Example gap: formalize evidence collection and ownership.':null,
      cmmi_score:Math.min(5,Math.max(1,base)),
      tier_score:tier,
      rationale:`[Demo] Scores reflect placeholder logic for UI testing, not a real assessment. Subcategory: ${text.slice(0,120)}${text.length>120?'…':''}`,
      recommendation:`[Demo] Strengthen documentation, monitoring, and accountability for ${id}.`,
      priority:prios[i%3],
      status:'pending'
    };
  });
  S.activeReviewFn=S.includedFns[0]||'GV';
  S.step='findings_review';
  saveState();
  render();
}

async function generateFindings(){
  const fns=FUNCTIONS.filter(f=>S.includedFns.includes(f.id));
  const n=fns.length;
  const findingsTimeHint=`Up to ${n} large AI requests run in parallel (one per CSF function in scope). That is usually faster than the old one-at-a-time flow, but each call is still heavy—plan on roughly 1–5 minutes when the API is responsive; free tiers may throttle or drop a request (check the console). Keep this tab open.`;
  setLoading(`Generating findings (${n} parallel requests)…`,findingsTimeHint);
  S.findings={};
  S.demoFindings=false;
  try{
    const answerSummary=Object.entries(S.answers).map(([qid,val])=>{
      const q=S.questionnaire?.roles?.flatMap(r=>r.questions).find(qu=>qu.id===qid);
      if(!q)return'';
      return`Q: ${q.text}\nAnswer: ${val}\nSubcategories: ${(q.subcategories||[]).join(', ')}`;
    }).filter(Boolean).join('\n\n');

    const settled=await Promise.allSettled(fns.map(fn=>fetchFindingsForFunction(fn,answerSummary)));
    let ok=0;
    settled.forEach((res,i)=>{
      if(res.status==='fulfilled'){
        const parsed=res.value;
        if(parsed&&typeof parsed==='object'){
          Object.assign(S.findings,parsed);
          Object.keys(parsed).forEach(id=>{if(S.findings[id]&&!S.findings[id].status)S.findings[id].status='pending';});
          ok++;
        }
      }else{console.warn('Findings error:',fns[i]?.id,res.reason);}
    });
    if(ok===0)throw new Error('No findings were returned. Check your API key, model, and network; open the browser console (F12) for details.');
    if(ok<fns.length){
      const failed=fns.filter((_,i)=>settled[i].status==='rejected').map(f=>f.id);
      if(failed.length)console.warn('Findings: some functions failed (partial merge):',failed.join(', '));
    }
    S.activeReviewFn=S.includedFns[0]||'GV';S.step='findings_review';saveState();
  }catch(e){
    clearLoading();render();
    alert('Error generating findings: '+e.message);
  }finally{clearLoading();render();}
}

async function reanalyzeFinding(scId){
  const f=S.findings[scId];const sc=SC_MAP[scId];
  if(!(f.dispute_note||'').trim()){alert('Please describe your dispute or provide additional context first.');return;}
  setLoading(`Re-analyzing ${scId}...`);
  try{
    const sys=`You are a NIST CSF 2.0 assessor revising a finding based on new organizational context. Return ONLY valid JSON.`;
    const msg=`Subcategory: ${scId}\nText: ${sc.text}\n\nOriginal finding:\nCurrent state: ${f.current_state}\nRationale: ${f.rationale}\nCMMI: ${f.cmmi_score} | Tier: ${f.tier_score}\n\nOrganization's dispute/context:\n${f.dispute_note}\n\nRevise the finding considering this new context. If new context changes the score, update it; otherwise maintain and note the organization's position.\n\nReturn JSON:\n{"current_state":"...","gaps":"...","cmmi_score":2,"tier_score":2,"rationale":"...","recommendation":"...","priority":"high|medium|low","dispute_resolution":"how dispute was resolved"}`;
    const raw=await callAI(sys,msg,true,{outputTokens:8192,jsonMime:providerSupportsJsonMime()});
    const parsed=parseJSON(raw);
    S.findings[scId]={...f,...parsed,status:'approved',dispute_note:f.dispute_note};saveState();
  }catch(e){
    clearLoading();render();
    alert('Re-analysis error: '+e.message);
  }finally{clearLoading();render();}
}

// FILE HANDLERS
// ════════════════════════════════════════════════════════════
async function processFiles(catId,reqId,files){
  setLoading('Reading files...');
  const entry=getDrlEntry(catId,reqId);
  entry.notProvided=false;
  entry.notProvidedReason='';
  for(const file of files){
    try{
      const content=await extractText(file);
      entry.files.push({name:file.name,content,size:file.size,context:''});
    }
    catch(e){console.warn('File error:',file.name,e);}
  }
  clearLoading();saveState();render();
}
function handleFileInput(e,catId,reqId){processFiles(catId,reqId,Array.from(e.target.files));}
function handleDrop(e,catId,reqId){e.preventDefault();document.querySelector(`[data-dropzone][data-cat="${catId}"][data-req="${reqId}"]`)?.classList.remove('drag-over');processFiles(catId,reqId,Array.from(e.dataTransfer.files));}

// ════════════════════════════════════════════════════════════
// EVENT HANDLING
// ════════════════════════════════════════════════════════════
document.addEventListener('click',e=>{
  const t=e.target instanceof Element?e.target:e.target?.parentElement;
  const el=t?.closest?.('[data-action]');
  if(!el)return;
  const action=el.dataset.action;

  if(action==='set-provider'){
    const prov=el.value||el.dataset.val;
    S.provider=prov;
    S.model=defaultModelForProvider(prov==='gemini'||prov==='anthropic'||prov==='openai'?prov:'gemini');
    S.apiKey=localStorage.getItem('csf_apiKey')||'';
    persistAIPrefs();
    render();
  }
  else if(action==='toggle-api-help'){
    const box=document.getElementById('api-help');
    if(box){const shown=box.style.display==='none';box.style.display=shown?'block':'none';el.textContent=shown?'Hide':'How do I get this?';}
  }
  else if(action==='welcome-start'){
    S.provider=document.querySelector('input[name="provider"]:checked')?.value||S.provider;
    S.apiKey=document.getElementById('inp-apikey').value.trim();
    S.model=document.getElementById('inp-model').value;
    if(!S.apiKey){alert('Please enter your API key.');return;}
    localStorage.setItem('csf_apiKey',S.apiKey);
    persistAIPrefs();
    S.demoEvidence=false;
    S.step='setup';saveState();render();
  }
  else if(action==='welcome-resume'){
    loadState();
    const keyInput=document.getElementById('inp-apikey');
    if(keyInput?.value.trim())S.apiKey=keyInput.value.trim();
    if(!S.apiKey){alert('Please enter your API key.');return;}
    persistAIPrefs();
    saveState();
    render();
  }
  else if(action==='goto-welcome'){S.step='welcome';persistAIPrefs();saveState();render();}
  else if(action==='goto-setup'){S.step='setup';render();}
  else if(action==='goto-drl'){S.step='drl';render();}
  else if(action==='goto-analysis'){S.step='analysis';render();}
  else if(action==='goto-questionnaire'){S.step='questionnaire';render();}
  else if(action==='goto-findings-review'){S.step='findings_review';render();}
  else if(action==='setup-next'){
    const name=document.getElementById('inp-org-name').value.trim();
    if(!name){alert('Organization name is required.');return;}
    S.org.name=name;S.org.industry=document.getElementById('inp-org-industry').value;
    S.org.assessorName=document.getElementById('inp-org-assessor').value.trim();
    S.org.scope=document.getElementById('inp-org-scope').value.trim();
    S.scoringMethod=document.querySelector('input[name="scoring"]:checked')?.value||'both';
    S.includedFns=Array.from(document.querySelectorAll('input[name="fn"]:checked')).map(x=>x.value);
    if(!S.includedFns.length){alert('Select at least one function.');return;}
    S.drlViewFns=FUNCTIONS.map(f=>f.id).filter(id=>S.includedFns.includes(id));
    S.step='drl';saveState();render();
  }
  else if(action==='remove-file'){
    const entry=getDrlEntry(el.dataset.cat,el.dataset.req);
    entry.files.splice(parseInt(el.dataset.idx),1);
    saveState();render();
  }
  else if(action==='toggle-not-provided'){
    const entry=getDrlEntry(el.dataset.cat,el.dataset.req);
    entry.notProvided=!!el.checked;
    if(entry.notProvided){entry.files=[];}
    if(!entry.notProvided){entry.notProvidedReason='';}
    saveState();render();
  }
  else if(action==='drl-view-all-fns'){
    drlSelectAllViewFns();
    saveState();render();
  }
  else if(action==='drl-toggle-viewfn'){
    const fid=el.dataset.fn;
    if(!fid||!S.includedFns.includes(fid))return;
    ensureDrlViewFns();
    const set=new Set(S.drlViewFns);
    if(set.has(fid)){
      if(set.size<=1)return;
      set.delete(fid);
    }else set.add(fid);
    S.drlViewFns=FUNCTIONS.map(f=>f.id).filter(id=>set.has(id));
    saveState();render();
  }
  else if(action==='toggle-sc-sidebar'){
    const sb=document.getElementById('drl-sc-sidebar');
    const rail=document.querySelector('.drl-sc-fab');
    if(!sb)return;
    sb.classList.toggle('collapsed');
    const open=!sb.classList.contains('collapsed');
    if(rail){rail.textContent=open?'◀':'▶';rail.setAttribute('aria-expanded',open?'true':'false');}
  }
  else if(action==='drl-jump-sc-cat'){
    e.preventDefault();
    const ref=el.dataset.catref;
    if(!ref)return;
    const sb=document.getElementById('drl-sc-sidebar');
    const target=document.getElementById('sc-cat-'+ref);
    const rail=document.querySelector('.drl-sc-fab');
    if(sb)sb.classList.remove('collapsed');
    if(rail){rail.textContent='◀';rail.setAttribute('aria-expanded','true');}
    if(target){
      const scrollEl=document.querySelector('.drl-sc-sidebar-scroll');
      setTimeout(()=>{
        if(scrollEl){
          const y=target.getBoundingClientRect().top-scrollEl.getBoundingClientRect().top+scrollEl.scrollTop;
          scrollEl.scrollTo({top:Math.max(0,y-10),behavior:'smooth'});
        }else{target.scrollIntoView({behavior:'smooth',block:'nearest'});}
        target.classList.remove('drl-sc-flash');
        void target.offsetWidth;
        target.classList.add('drl-sc-flash');
        setTimeout(()=>target.classList.remove('drl-sc-flash'),1200);
      },70);
    }
  }
  else if(action==='drl-demo-skip'){applyDemoEvidenceSkip();}
  else if(action==='drl-analyze'){analyzeDocuments();}
  else if(action==='gen-questionnaire'){generateQuestionnaire();}
  else if(action==='gen-findings'){generateFindings();}
  else if(action==='questionnaire-demo-fill'){applyDemoQuestionnaireAnswers();}
  else if(action==='questionnaire-demo-findings'){applyDemoFindingsSkipAi();}
  else if(action==='set-role'){S.activeRole=parseInt(el.dataset.idx);render();}
  else if(action==='answer-q'){S.answers[el.dataset.qid]=el.dataset.val;saveState();render();}
  else if(action==='set-review-fn'){S.activeReviewFn=el.dataset.fn;render();}
  else if(action==='approve-finding'){
    const sid=findingScidFromEl(el);
    if(!sid||!S.findings[sid]){console.warn('approve-finding: missing finding for',sid);return;}
    S.findings[sid].status='approved';saveState();render();
  }
  else if(action==='dispute-finding'){
    const sid=findingScidFromEl(el);
    if(!sid||!S.findings[sid]){console.warn('dispute-finding: missing finding for',sid);return;}
    S.findings[sid].status='disputed';saveState();render();
  }
  else if(action==='reanalyze-finding'){
    const sid=findingScidFromEl(el);
    if(!sid||!S.findings[sid]){console.warn('reanalyze-finding: missing finding for',sid);return;}
    const ta=document.querySelector(`[data-action="dispute-text"][data-scid="${sid}"]`);
    if(ta)S.findings[sid].dispute_note=ta.value;
    reanalyzeFinding(sid);
  }
  else if(action==='accept-dispute'){
    const sid=findingScidFromEl(el);
    if(!sid||!S.findings[sid]){console.warn('accept-dispute: missing finding for',sid);return;}
    const ta=document.querySelector(`[data-action="dispute-text"][data-scid="${sid}"]`);
    if(ta)S.findings[sid].dispute_note=ta.value;
    S.findings[sid].status='approved';saveState();render();
  }
  else if(action==='approve-all-pending'){
    const msg='This will mark every PENDING in-scope finding as Approved.\n\nOnly continue after you have reviewed each finding. Use Dispute on any row that is wrong before proceeding — rows already marked Disputed will not be changed.\n\nContinue?';
    if(!confirm(msg))return;
    SC_RAW.filter(([id])=>S.includedFns.includes(id.split('.')[0])).forEach(([id])=>{
      const f=S.findings[id];
      if(!f)return;
      const st=f.status;
      if(!st||st==='pending')f.status='approved';
    });
    saveState();render();
  }
  else if(action==='gen-report'){S.step='report';S.reportPage=0;saveState();render();}
  else if(action==='report-page-prev'){S.reportPage=Math.max(0,(S.reportPage||0)-1);saveState();render();window.scrollTo(0,0);}
  else if(action==='report-page-next'){
    const fns=FUNCTIONS.filter(f=>S.includedFns.includes(f.id));
    S.reportPage=Math.min(fns.length,(S.reportPage||0)+1);
    saveState();render();window.scrollTo(0,0);
  }
  else if(action==='report-goto-page'){
    const fns=FUNCTIONS.filter(f=>S.includedFns.includes(f.id));
    const p=parseInt(el.dataset.page,10);
    if(Number.isNaN(p)||p<0||p>fns.length)return;
    S.reportPage=p;
    saveState();render();window.scrollTo(0,0);
  }
  else if(action==='export-json'){
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`csf-assessment-${(S.org.name||'org').replace(/\s+/g,'-')}-${S.org.date||new Date().toISOString().slice(0,10)}.json`;a.click();
  }
});

document.addEventListener('input',e=>{
  const el=e.target;
  if(!(el instanceof Element))return;
  const action=el.dataset.action;
  if(action==='answer-text'){S.answers[el.dataset.qid]=el.value;clearTimeout(el._t);el._t=setTimeout(()=>saveState(),800);}
  else if(action==='dispute-text'){
    const sid=findingScidFromEl(el);
    if(sid&&S.findings[sid])S.findings[sid].dispute_note=el.value;
  }
  else if(action==='set-file-context'){
    const entry=getDrlEntry(el.dataset.cat,el.dataset.req);
    const idx=parseInt(el.dataset.idx);
    if(entry.files[idx])entry.files[idx].context=el.value;
    clearTimeout(el._t);el._t=setTimeout(()=>saveState(),500);
  }
  else if(action==='set-not-provided-reason'){
    const entry=getDrlEntry(el.dataset.cat,el.dataset.req);
    entry.notProvidedReason=el.value;
    clearTimeout(el._t);el._t=setTimeout(()=>saveState(),500);
  }
});

document.addEventListener('change',e=>{
  const t=e.target;
  if(t&&t.id==='inp-model'){
    S.model=t.value;
    persistAIPrefs();
  }
});

// MAIN RENDER
// ════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  switch(S.step){
    case 'welcome':         app.innerHTML=renderWelcome();break;
    case 'setup':           app.innerHTML=renderSetup();break;
    case 'drl':             app.innerHTML=renderDRL();break;
    case 'analysis':        app.innerHTML=renderAnalysis();break;
    case 'questionnaire':   app.innerHTML=renderQuestionnaire();break;
    case 'findings_review': app.innerHTML=renderFindingsReview();break;
    case 'report':          app.innerHTML=renderReport();break;
    default:                app.innerHTML=renderWelcome();
  }
}
render();
